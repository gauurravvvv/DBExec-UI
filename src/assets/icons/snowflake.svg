<?xml version="1.0" encoding="UTF-8"?>
<!--
  Snowflake brand mark — three crossing lines at 60° intervals with a
  centre dot, in Snowflake brand blue (#29B5E8). This is the canonical
  Snowflake Inc. product glyph as it appears at small sizes (in their
  product UI, favicon, app icon). Renders cleanly at 16-24px alongside
  the other engine brand marks (Postgres elephant, MySQL dolphin, etc.)
  in the datasource selector — the previous detailed snowflake.svg was
  noisy and pixelated at those sizes.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <g stroke="#29B5E8" stroke-width="3.2" stroke-linecap="round">
    <line x1="16"   y1="4"  x2="16"   y2="28" />
    <line x1="5.39" y1="10" x2="26.61" y2="22" />
    <line x1="5.39" y1="22" x2="26.61" y2="10" />
  </g>
  <circle cx="16" cy="16" r="3" fill="#29B5E8" />
</svg>
