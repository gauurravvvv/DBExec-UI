<div class="confirmation-popup" *ngIf="unsavedChangesService.showDialog()">
  <div class="popup-content">
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-exclamation-triangle"></i>
      </div>
      <h3>{{ 'UNSAVED_CHANGES.TITLE' | translate }}</h3>
    </div>

    <div class="popup-body">
      <p class="popup-message">{{ 'UNSAVED_CHANGES.MESSAGE' | translate }}</p>
      <p class="popup-hint">{{ 'UNSAVED_CHANGES.HINT' | translate }}</p>
    </div>

    <div class="popup-actions">
      <button class="btn-cancel" (click)="stay()">
        <i class="pi pi-times"></i>
        {{ 'UNSAVED_CHANGES.STAY' | translate }}
      </button>
      <button class="btn-confirm" (click)="leave()">
        <i class="pi pi-sign-out"></i>
        {{ 'UNSAVED_CHANGES.DISCARD_LEAVE' | translate }}
      </button>
    </div>
  </div>
</div>
