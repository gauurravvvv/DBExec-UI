<div class="form-field">
  <label *ngIf="label">
    {{ label }}
    <span class="required" *ngIf="required">*</span>
    <i
      *ngIf="tooltip"
      class="pi pi-info-circle label-tooltip"
      [pTooltip]="tooltip"
      tooltipPosition="top"
    ></i>
  </label>
  <!-- Textarea Mode -->
  <ng-container *ngIf="inputMode === 'textarea'; else inputBlock">
    <textarea
      pInputTextarea
      [placeholder]="placeholder"
      [value]="value"
      [disabled]="disabled || inputDisabled"
      [readonly]="readonly"
      [rows]="rows"
      [autoResize]="autoResize"
      [attr.minlength]="minLength"
      [ngClass]="{ 'ng-invalid ng-dirty': isInvalid }"
      (input)="onInputChange($event)"
      (blur)="onBlur()"
    >
    </textarea>
  </ng-container>
  <!-- Input Mode -->
  <ng-template #inputBlock>
    <ng-container *ngIf="icon || showPasswordToggle; else noIconInput">
      <span
        [ngClass]="{
          'p-input-icon-left': icon,
          'p-input-icon-right': showPasswordToggle,
        }"
      >
        <i *ngIf="icon" class="pi {{ icon }}"></i>
        <input
          [type]="inputType"
          pInputText
          [placeholder]="placeholder"
          [value]="value"
          [disabled]="disabled || inputDisabled"
          [readonly]="readonly"
          [attr.minlength]="minLength"
          [attr.id]="inputId || null"
          [attr.autocomplete]="autocomplete || null"
          [attr.aria-label]="ariaLabel || null"
          [class]="styleClass"
          [ngClass]="{ 'ng-invalid ng-dirty': isInvalid }"
          (input)="onInputChange($event)"
          (blur)="onBlur()"
        />
        <i
          *ngIf="showPasswordToggle"
          class="pi password-toggle-icon"
          [ngClass]="passwordVisible ? 'pi-eye-slash' : 'pi-eye'"
          (click)="togglePasswordVisibility($event)"
        ></i>
      </span>
    </ng-container>
    <ng-template #noIconInput>
      <input
        [type]="inputType"
        pInputText
        [placeholder]="placeholder"
        [value]="value"
        [disabled]="disabled || inputDisabled"
        [readonly]="readonly"
        [attr.minlength]="minLength"
        [attr.id]="inputId || null"
        [attr.autocomplete]="autocomplete || null"
        [attr.aria-label]="ariaLabel || null"
        [class]="styleClass"
        [ngClass]="{ 'ng-invalid ng-dirty': isInvalid }"
        (input)="onInputChange($event)"
        (blur)="onBlur()"
      />
    </ng-template>
  </ng-template>
  <small class="hint-message" *ngIf="hint && !visibleError">
    {{ hint }}
  </small>
  <!-- Inline length error (blocks propagation to parent ngModel until
       the user trims back to ≤ maxLength). Same UX as app-custom-number
       bounds errors. -->
  <small class="error-message" *ngIf="visibleError">
    {{ visibleError }}
  </small>
  <!-- Character counter (only when maxLength is set). Sits flush right
       so the user always sees how close they are to the cap. -->
  <small class="char-counter" *ngIf="maxLength != null && !visibleError">
    {{ charCounter }}
  </small>
</div>
