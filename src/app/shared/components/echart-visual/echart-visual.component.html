<div class="echart-visual-container">
  <!-- Render gate: hide the chart until BOTH echarts-gl has loaded (GL types)
       AND the GeoJSON map has been registered (map/geo types). No-op for
       ordinary charts. Without this, GL series throw on missing classes and
       map series render against an unregistered map name (blank). -->
  <div
    *ngIf="renderReady; else glLoading"
    echarts
    [options]="chartOption"
    [merge]="mergeOption"
    [initOpts]="initOpts"
    [autoResize]="true"
    class="echart-canvas"
    [style.width.px]="chartWidth ? chartWidth - 10 : null"
    [style.height.px]="chartHeight ? chartHeight - 10 : null"
    (chartInit)="onChartInit($event)"
    (chartClick)="onChartClick($event)"
  ></div>
  <ng-template #glLoading>
    <div class="echart-gl-loading">
      <i class="pi pi-spin pi-spinner"></i>
    </div>
  </ng-template>
</div>
