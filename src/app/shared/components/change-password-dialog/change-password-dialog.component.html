<div
  class="change-password-popup"
  *ngIf="visible"
  (click)="onBackdropClick($event)"
>
  <div class="popup-content" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-key"></i>
      </div>
      <h3>Change Password</h3>
    </div>

    <form [formGroup]="passwordForm" class="password-form">
      <!-- New Password -->
      <app-custom-input
        formControlName="newPassword"
        label="New Password"
        placeholder="Enter new password"
        icon="pi-lock"
        [required]="true"
        [showPasswordToggle]="true"
        [showError]="
          !!(
            passwordForm.get('newPassword')?.invalid &&
            passwordForm.get('newPassword')?.touched
          )
        "
        errorMessage="Password must be at least 8 chars with uppercase, lowercase, number & special char"
      >
      </app-custom-input>

      <!-- Confirm Password -->
      <app-custom-input
        formControlName="confirmPassword"
        label="Confirm Password"
        placeholder="Confirm new password"
        icon="pi-lock"
        [required]="true"
        [showPasswordToggle]="true"
        [showError]="
          !!(
            passwordForm.hasError('mismatch') &&
            passwordForm.get('confirmPassword')?.touched
          )
        "
        errorMessage="Passwords do not match"
      >
      </app-custom-input>

      <div class="popup-actions">
        <button
          type="button"
          class="btn-cancel"
          (click)="onCancel(); $event.stopPropagation()"
        >
          <i class="pi pi-times"></i>
          Cancel
        </button>
        <button
          type="submit"
          class="btn-confirm"
          [disabled]="passwordForm.invalid || passwordForm.hasError('mismatch')"
          (click)="onSubmit()"
        >
          <i class="pi pi-save"></i>
          Update Password
        </button>
      </div>
    </form>
  </div>
</div>
