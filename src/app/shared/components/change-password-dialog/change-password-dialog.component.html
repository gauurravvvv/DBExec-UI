<div
  class="change-password-popup"
  *ngIf="visible"
  (click)="onBackdropClick($event)"
>
  <div class="popup-content" (click)="$event.stopPropagation()">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-key"></i>
      </div>
      <h3>{{ 'CHANGE_PASSWORD.TITLE' | translate }}</h3>
    </div>

    <form [formGroup]="passwordForm" class="password-form">
      <!-- New Password -->
      <app-custom-input
        formControlName="newPassword"
        [label]="'CHANGE_PASSWORD.NEW_PASSWORD' | translate"
        [placeholder]="'CHANGE_PASSWORD.ENTER_NEW_PASSWORD' | translate"
        icon="pi-lock"
        [required]="true"
        [showPasswordToggle]="true"
        [showError]="
          !!(
            passwordForm.get('newPassword')?.invalid &&
            passwordForm.get('newPassword')?.touched
          )
        "
        [errorMessage]="'PASSWORD.STRENGTH_HINT' | translate"
      >
      </app-custom-input>

      <!-- Confirm Password -->
      <app-custom-input
        formControlName="confirmPassword"
        [label]="'AUTH.CONFIRM_PASSWORD' | translate"
        [placeholder]="'CHANGE_PASSWORD.CONFIRM_NEW_PASSWORD' | translate"
        icon="pi-lock"
        [required]="true"
        [showPasswordToggle]="true"
        [showError]="
          !!(
            passwordForm.hasError('mismatch') &&
            passwordForm.get('confirmPassword')?.touched
          )
        "
        [errorMessage]="'PASSWORD.MISMATCH' | translate"
      >
      </app-custom-input>

      <div class="popup-actions">
        <button
          type="button"
          class="btn-cancel"
          (click)="onCancel(); $event.stopPropagation()"
        >
          <i class="pi pi-times"></i>
          {{ 'COMMON.CANCEL' | translate }}
        </button>
        <button
          type="submit"
          class="btn-confirm"
          [disabled]="passwordForm.invalid || passwordForm.hasError('mismatch')"
          (click)="onSubmit()"
        >
          <i class="pi pi-save"></i>
          {{ 'CHANGE_PASSWORD.UPDATE_PASSWORD' | translate }}
        </button>
      </div>
    </form>
  </div>
</div>
