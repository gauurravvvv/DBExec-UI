<section class="nf-page">
  <div class="nf-card" role="alert" aria-live="polite">
    <div class="nf-art" aria-hidden="true">
      <span class="nf-art__digit">4</span>
      <span class="nf-art__dot"></span>
      <span class="nf-art__digit">4</span>
    </div>

    <h1 class="nf-title">Page not found</h1>
    <p class="nf-subtitle">
      The page you’re looking for doesn’t exist, was moved, or you don’t
      have permission to view it.
    </p>

    <div class="nf-actions">
      <a class="nf-btn nf-btn--primary" [routerLink]="['/app/home']">
        <i class="pi pi-home" aria-hidden="true"></i>
        <span>Go home</span>
      </a>
    </div>
  </div>
</section>
