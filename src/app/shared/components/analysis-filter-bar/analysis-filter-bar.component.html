<div class="filter-bar" *ngIf="filters.length > 0">
  <div class="filter-controls">
    <ng-container *ngFor="let filter of filters; trackBy: trackById">
      <!-- Category: Dropdown -->
      <div class="filter-control" *ngIf="filter.controlType === 'dropdown'">
        <app-custom-dropdown
          [label]="filter.name"
          [options]="filterValues[filter.id] || []"
          optionLabel="label"
          optionValue="value"
          [placeholder]="filter.config?.placeholder || 'Select ' + filter.name"
          [showClear]="true"
          [filter]="(filterValues[filter.id] || []).length > 10"
          [(ngModel)]="appliedValues[filter.id]"
          (onChangeEvent)="onFilterChange(filter, $event)"
          [appendTo]="'body'"
        ></app-custom-dropdown>
      </div>

      <!-- Category: Multi-Select List -->
      <div class="filter-control" *ngIf="filter.controlType === 'list'">
        <app-custom-multiselect
          [label]="filter.name"
          [options]="filterValues[filter.id] || []"
          optionLabel="label"
          optionValue="value"
          [placeholder]="filter.config?.placeholder || 'Select ' + filter.name"
          [filter]="(filterValues[filter.id] || []).length > 10"
          [(ngModel)]="appliedValues[filter.id]"
          display="comma"
          [maxSelectedLabels]="1"
          [selectedItemsLabel]="'{0} selected'"
          [appendTo]="'body'"
        ></app-custom-multiselect>
      </div>

      <!-- Numeric: Input -->
      <div
        class="filter-control"
        *ngIf="
          filter.controlType === 'text' &&
          (filter.filterType === 'numeric_equality' ||
            filter.filterType === 'numeric_range')
        "
      >
        <app-custom-number
          [label]="filter.name"
          [placeholder]="filter.config?.placeholder || filter.name"
          [(ngModel)]="appliedValues[filter.id]"
          (onChangeEvent)="onFilterChange(filter, $event)"
        ></app-custom-number>
      </div>

      <!-- Numeric: Slider -->
      <div
        class="filter-control slider-control"
        *ngIf="filter.controlType === 'slider'"
      >
        <app-custom-rangeslider
          [label]="filter.name"
          [(ngModel)]="appliedValues[filter.id]"
          [min]="filter.config?.rangeMin ?? 0"
          [max]="filter.config?.rangeMax ?? 100"
        ></app-custom-rangeslider>
      </div>

      <!-- Date: Calendar -->
      <div class="filter-control" *ngIf="filter.controlType === 'datepicker'">
        <app-custom-calendar
          [label]="filter.name"
          [(ngModel)]="appliedValues[filter.id]"
          [selectionMode]="
            filter.filterType === 'time_range' ? 'multiple' : 'single'
          "
          [showTime]="filter.config?.includeTime || false"
          [placeholder]="filter.config?.placeholder || 'Select date'"
          [dateFormat]="filter.config?.dateFormat || 'yy-mm-dd'"
          [numberOfMonths]="filter.filterType === 'time_range' ? 2 : 1"
          (onChangeEvent)="onFilterChange(filter, appliedValues[filter.id])"
        ></app-custom-calendar>
      </div>

      <!-- Text: Input -->
      <div
        class="filter-control"
        *ngIf="
          filter.controlType === 'text' && filter.filterType === 'category'
        "
      >
        <app-custom-input
          [label]="filter.name"
          [placeholder]="filter.config?.placeholder || 'Search ' + filter.name"
          [(ngModel)]="appliedValues[filter.id]"
          (ngModelChange)="onFilterChange(filter, appliedValues[filter.id])"
        >
        </app-custom-input>
      </div>
    </ng-container>
  </div>

  <div class="filter-actions">
    <button
      class="btn-apply"
      (click)="applyFilters()"
      [disabled]="!hasActiveFilters"
    >
      <i class="pi pi-check"></i>
      Apply
    </button>
    <button class="btn-clear" (click)="clearFilters()" *ngIf="hasActiveFilters">
      <i class="pi pi-times"></i>
      Clear
    </button>
  </div>
</div>
