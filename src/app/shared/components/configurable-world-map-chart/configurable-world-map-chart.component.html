<div class="world-map-chart-container">
  <div class="chart-wrapper">
    <div class="chart-section">
      <!-- Loading state -->
      <div class="map-state-overlay" *ngIf="mapLoading">
        <i class="pi pi-spin pi-spinner"></i>
        <span>Loading map data…</span>
      </div>

      <!-- Error state -->
      <div class="map-state-overlay map-error" *ngIf="mapError && !mapLoading">
        <i class="pi pi-exclamation-circle"></i>
        <p>{{ mapErrorMessage }}</p>
        <small>Provide a GeoJSON file and set the Map Data URL in Properties.</small>
      </div>

      <!-- Chart (only when map is registered) -->
      <div
        *ngIf="mapReady && !mapLoading"
        echarts
        [options]="chartOption"
        [autoResize]="true"
        class="echart-container"
        [style.width.px]="chartWidth ? chartWidth - 10 : null"
        [style.height.px]="chartHeight ? chartHeight - 10 : null"
        (chartInit)="onChartInit($event)"
        (chartClick)="onChartSelect($event)"
      ></div>
    </div>
  </div>
</div>
