<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <!-- Header Section -->
    <div class="page-header">
      <div class="left-section">
        <h2>{{ 'ACCESS.ACCESS_MANAGER' | translate }}</h2>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          [label]="'COMMON.CANCEL' | translate"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          [label]="'ACCESS.GRANT_ACCESS' | translate"
          (click)="onSubmit()"
          [disabled]="accessForm.invalid || saving()"
        >
          <i
            class="pi mr-2"
            [ngClass]="saving() ? 'pi-spin pi-spinner' : 'pi-save'"
          ></i>
        </button>
      </div>
    </div>

    <!-- Form Section -->
    <form [formGroup]="accessForm" class="admin-form">
      <div class="form-grid">
        <!-- Datasource Dropdown — server-driven -->
        <app-custom-dropdown
          formControlName="datasource"
          [label]="'COMMON.DATASOURCE' | translate"
          [placeholder]="'ACCESS.SELECT_DATASOURCE' | translate"
          [serverMode]="true"
          [fetcher]="loadDatasourcesPage"
          [pageSize]="10"
          [preloadedItems]="preloadedDatasources"
          [preloadedTotal]="preloadedDatasourcesTotal"
          optionLabel="name"
          optionValue="id"
          [filter]="true"
          filterBy="name"
          [required]="true"
          (onChangeEvent)="loadConnections()"
          [showError]="
            !!(
              accessForm.get('datasource')?.invalid &&
              accessForm.get('datasource')?.touched
            )
          "
          [errorMessage]="'VALIDATION.DATASOURCE_REQUIRED' | translate"
          icon="pi-database"
        >
        </app-custom-dropdown>

        <!-- Connection Dropdown — server-driven -->
        <app-custom-dropdown
          formControlName="connection"
          [label]="'COMMON.CONNECTION' | translate"
          [placeholder]="'ACCESS.SELECT_CONNECTION' | translate"
          [serverMode]="true"
          [fetcher]="loadConnectionsPage"
          [pageSize]="10"
          [preloadedItems]="preloadedConnections"
          [preloadedTotal]="preloadedConnectionsTotal"
          optionLabel="name"
          optionValue="id"
          [filter]="true"
          filterBy="name"
          [required]="true"
          (onChangeEvent)="onConnectionChange()"
          [showError]="
            !!(
              accessForm.get('connection')?.invalid &&
              accessForm.get('connection')?.touched
            )
          "
          [errorMessage]="'VALIDATION.CONNECTION_REQUIRED' | translate"
          icon="pi-link"
        >
        </app-custom-dropdown>

        <!-- Skeleton placeholders for the groups + users multiselects
             while the access-details GET resolves on connection change.
             Hidden once loading is done so the real controls below
             take over. The form is fully usable; only these two
             scope-dependent controls swap. -->
        <ng-container *ngIf="loading()">
          <app-content-loader minHeight="180px"></app-content-loader>
        </ng-container>

        <!-- Groups Multiselect -->
        <app-custom-multiselect
          *ngIf="!loading()"
          formControlName="groups"
          [label]="'COMMON.GROUPS' | translate"
          [placeholder]="'ACCESS.SELECT_GROUPS' | translate"
          [options]="groups"
          optionLabel="name"
          optionValue="id"
          [filter]="true"
          filterBy="name"
          display="chip"
          [showError]="
            !!(
              accessForm.get('groups')?.invalid &&
              accessForm.get('groups')?.touched
            )
          "
          [errorMessage]="'VALIDATION.GROUPS_REQUIRED' | translate"
          icon="pi-users"
        >
        </app-custom-multiselect>

        <!-- Users Multiselect -->
        <app-custom-multiselect
          *ngIf="!loading()"
          formControlName="users"
          [label]="'COMMON.USERS' | translate"
          [placeholder]="'ACCESS.SELECT_USERS' | translate"
          [options]="users"
          optionLabel="username"
          optionValue="id"
          [filter]="true"
          filterBy="name"
          display="chip"
          [showError]="
            !!(
              accessForm.get('users')?.invalid &&
              accessForm.get('users')?.touched
            )
          "
          [errorMessage]="'VALIDATION.USERS_REQUIRED' | translate"
          icon="pi-users"
        >
        </app-custom-multiselect>
      </div>
    </form>
  </div>
</div>
