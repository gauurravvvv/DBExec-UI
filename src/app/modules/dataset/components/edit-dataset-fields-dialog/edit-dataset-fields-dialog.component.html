<div class="edit-fields-popup" *ngIf="visible">
  <div class="popup-content">
    <h3>{{ dialogTitle }}</h3>
    <div class="fields-form">
      <!-- Form Content -->
      <div class="form-field" *ngIf="editableField">
        <div class="input-group">
          <app-custom-input
            [(ngModel)]="editableField.columnToUse"
            [label]="'DATASET.FIELD_NAME_TO_USE' | translate"
            [placeholder]="'DATASET.COLUMN_NAME' | translate"
            [inputDisabled]="true"
          >
          </app-custom-input>
        </div>
        <div class="input-group">
          <app-custom-input
            [(ngModel)]="editableField.columnToView"
            [label]="'DATASET.FIELD_NAME_TO_SHOW' | translate"
            [placeholder]="'DATASET.DISPLAY_NAME' | translate"
            [maxLength]="MAX_NAME_LENGTH"
            [showError]="!!nameError"
            [errorMessage]="nameError"
            (ngModelChange)="onFieldChange()"
          >
          </app-custom-input>
          <small class="char-count">
            {{ editableField.columnToView?.length || 0 }}/{{ MAX_NAME_LENGTH }}
          </small>
        </div>
        <div class="input-group">
          <app-custom-dropdown
            [options]="analyticalTypes"
            [ngModel]="editableField.dataType"
            (ngModelChange)="onDataTypeChange($event)"
            [label]="'DATASET.DATA_TYPE' | translate"
            optionLabel="label"
            optionValue="value"
            [placeholder]="'DATASET.SELECT_DATA_TYPE' | translate"
            [filter]="true"
            [autoDisplayFirst]="false"
            appendTo="body"
          >
          </app-custom-dropdown>
          <small class="type-hint">
            {{ 'DATASET.DATA_TYPE_HINT' | translate }}
          </small>
        </div>
      </div>

      <div class="popup-actions">
        <button
          pButton
          type="button"
          [label]="'COMMON.CANCEL' | translate"
          class="p-button-outlined btn-cancel"
          (click)="onCancel()"
          [disabled]="isSubmitting"
        ></button>
        <button
          pButton
          type="button"
          [label]="'COMMON.SAVE' | translate"
          class="p-button-primary btn-save"
          (click)="onSubmit()"
          [disabled]="!isSaveEnabled || isSubmitting"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>
  </div>
</div>
