<div class="edit-fields-popup" *ngIf="visible">
  <div class="popup-content">
    <h3>{{ dialogTitle }}</h3>
    <div class="fields-form">
      <!-- Form Content -->
      <div class="form-field" *ngIf="editableField">
        <div class="input-group">
          <app-custom-input
            [(ngModel)]="editableField.columnToUse"
            label="Field name to use"
            placeholder="Column name"
            [inputDisabled]="true"
          >
          </app-custom-input>
        </div>
        <div class="input-group">
          <app-custom-input
            [(ngModel)]="editableField.columnToView"
            label="Field name to show"
            placeholder="Display name"
            [maxLength]="MAX_NAME_LENGTH"
            [showError]="!!nameError"
            [errorMessage]="nameError"
            (ngModelChange)="onFieldChange()"
          >
          </app-custom-input>
          <small class="char-count">
            {{ editableField.columnToView?.length || 0 }}/{{ MAX_NAME_LENGTH }}
          </small>
        </div>
        <div class="input-group">
          <app-custom-dropdown
            [options]="analyticalTypes"
            [ngModel]="editableField.dataType"
            (ngModelChange)="onDataTypeChange($event)"
            label="Data Type"
            optionLabel="label"
            optionValue="value"
            placeholder="Select data type"
            [filter]="true"
            [autoDisplayFirst]="false"
            appendTo="body"
          >
          </app-custom-dropdown>
          <small class="type-hint">
            Changing the data type affects how this field is interpreted in
            visualizations
          </small>
        </div>
      </div>

      <div class="popup-actions">
        <button
          pButton
          type="button"
          label="Cancel"
          class="p-button-outlined btn-cancel"
          (click)="onCancel()"
          [disabled]="isSubmitting"
        ></button>
        <button
          pButton
          type="button"
          label="Save"
          class="p-button-primary btn-save"
          (click)="onSubmit()"
          [disabled]="!isSaveEnabled || isSubmitting"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>
  </div>
</div>
