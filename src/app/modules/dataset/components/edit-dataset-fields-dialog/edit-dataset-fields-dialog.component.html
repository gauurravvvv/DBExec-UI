<div class="edit-fields-popup" *ngIf="visible">
  <div class="popup-content">
    <!-- Popup header — matches the confirmation-popup pattern used
         across edit-* screens (edit-group, edit-user, etc.) so this
         dialog reads consistently with the rest of the module. -->
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-pencil"></i>
      </div>
      <h3>{{ dialogTitle }}</h3>
    </div>
    <div class="fields-form">
      <!-- Form Content -->
      <div class="form-field" *ngIf="editableField">
        <div class="input-group">
          <app-custom-input [(ngModel)]="editableField.columnToUse" [label]="'DATASET.FIELD_NAME_TO_USE' | translate"
            [placeholder]="'DATASET.COLUMN_NAME' | translate" [inputDisabled]="true" icon="pi-id-card">
          </app-custom-input>
        </div>
        <div class="input-group">
          <app-custom-input [(ngModel)]="editableField.columnToView" [label]="'DATASET.FIELD_NAME_TO_SHOW' | translate"
            [placeholder]="'DATASET.DISPLAY_NAME' | translate" [maxLength]="MAX_NAME_LENGTH" [showError]="!!nameError"
            [errorMessage]="nameError" (ngModelChange)="onFieldChange()" [inputDisabled]="isSubmitting" icon="pi-id-card">
          </app-custom-input>
          <small class="char-count">
            {{ editableField.columnToView?.length || 0 }}/{{ MAX_NAME_LENGTH }}
          </small>
        </div>
        <div class="input-group">
          <app-custom-dropdown [options]="analyticalTypes" [ngModel]="editableField.dataType"
            (ngModelChange)="onDataTypeChange($event)" [label]="'DATASET.DATA_TYPE' | translate" optionLabel="label"
            optionValue="value" [placeholder]="'DATASET.SELECT_DATA_TYPE' | translate" [filter]="true"
            [autoDisplayFirst]="false" [disabled]="isSubmitting" icon="pi-th-large">
          </app-custom-dropdown>
          <small class="type-hint">
            {{ 'DATASET.DATA_TYPE_HINT' | translate }}
          </small>
        </div>
      </div>

      <div class="popup-actions">
        <button pButton type="button" [label]="'COMMON.CANCEL' | translate" class="p-button-outlined btn-cancel"
          (click)="onCancel()" [disabled]="isSubmitting"></button>
        <button pButton type="button" [label]="'COMMON.SAVE' | translate" class="p-button-primary btn-save"
          (click)="onSubmit()" [disabled]="!isSaveEnabled || isSubmitting">
          <i class="pi mr-2"
            [ngClass]="isSubmitting ? 'pi-spin pi-spinner' : 'pi-save'"></i>
        </button>
      </div>
    </div>
  </div>
</div>
