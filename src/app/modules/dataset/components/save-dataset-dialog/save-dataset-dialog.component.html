<div class="confirmation-popup" *ngIf="visible">
  <div class="popup-content">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-save"></i>
      </div>
      <h3>{{ dialogTitle }}</h3>
    </div>

    <!-- Form Body -->
    <div class="popup-body">
      <form [formGroup]="datasetForm">
        <!-- Dataset Name -->
        <div class="form-field">
          <app-custom-input
            formControlName="name"
            label="Name"
            placeholder="Enter dataset name"
            icon="pi-database"
            [required]="true"
            [showError]="
              !!(
                datasetForm.get('name')?.invalid &&
                datasetForm.get('name')?.touched
              )
            "
            [errorMessage]="getNameError()"
          >
          </app-custom-input>
        </div>

        <!-- Description -->
        <div class="form-field">
          <app-custom-input
            formControlName="description"
            label="Description"
            placeholder="Enter dataset description (optional)"
            icon="pi-align-left"
          >
          </app-custom-input>
          <small class="char-count">
            {{ datasetForm.get('description')?.value?.length || 0 }}/500
            characters
          </small>
        </div>
      </form>
    </div>

    <!-- Actions -->
    <div class="popup-actions">
      <button class="btn-cancel" (click)="onCancel()">
        <i class="pi pi-times"></i>
        Cancel
      </button>
      <button
        class="btn-confirm"
        [disabled]="datasetForm.invalid"
        (click)="onSubmit()"
      >
        <i class="pi pi-save"></i>
        Save Dataset
      </button>
    </div>
  </div>
</div>
