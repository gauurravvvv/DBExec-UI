<div class="confirmation-popup" *ngIf="visible">
  <div class="popup-content">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-save"></i>
      </div>
      <h3>{{ dialogTitle }}</h3>
    </div>

    <!-- Form Body -->
    <div class="popup-body">
      <form [formGroup]="datasetForm">
        <!-- Dataset Name -->
        <div class="form-field">
          <app-custom-input
            formControlName="name"
            [label]="'COMMON.NAME' | translate"
            [placeholder]="'DATASET.ENTER_DATASET_NAME' | translate"
            icon="pi-database"
            [required]="true"
            [showError]="
              !!(
                datasetForm.get('name')?.invalid &&
                datasetForm.get('name')?.touched
              )
            "
            [errorMessage]="getNameError()"
          >
          </app-custom-input>
        </div>

        <!-- Description -->
        <div class="form-field">
          <app-custom-input
            formControlName="description"
            [label]="'COMMON.DESCRIPTION' | translate"
            [placeholder]="'DATASET.ENTER_DATASET_DESCRIPTION' | translate"
            icon="pi-align-left"
          >
          </app-custom-input>
          <small class="char-count">
            {{ datasetForm.get('description')?.value?.length || 0 }}/500
            {{ 'COMMON.CHARACTERS' | translate }}
          </small>
        </div>

        <!-- Justification (for updates) -->
        <div class="form-field justification-section" *ngIf="showJustification">
          <label for="justification"
            >{{ 'COMMON.JUSTIFICATION' | translate }} <span class="required">*</span></label
          >
          <textarea
            id="justification"
            formControlName="justification"
            [placeholder]="'COMMON.JUSTIFICATION_UPDATE_PLACEHOLDER' | translate"
            rows="3"
            maxlength="500"
          ></textarea>
          <small class="char-count">
            {{ datasetForm.get('justification')?.value?.length || 0 }}/500
          </small>
        </div>
      </form>
    </div>

    <!-- Actions -->
    <div class="popup-actions">
      <button class="btn-cancel" (click)="onCancel()">
        <i class="pi pi-times"></i>
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button
        class="btn-confirm"
        [disabled]="datasetForm.invalid"
        (click)="onSubmit()"
      >
        <i class="pi pi-save"></i>
        {{ 'DATASET.SAVE_DATASET' | translate }}
      </button>
    </div>
  </div>
</div>
