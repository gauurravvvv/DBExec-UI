<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <!-- Header Section -->
    <div class="page-header">
      <div class="left-section">
        <button
          pButton
          class="p-button-text p-button-plain back-button"
          routerLink="/app/prompt"
        >
          <i class="pi pi-arrow-left text-xl"></i>
        </button>
        <h2>Edit Prompt</h2>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          label="Cancel"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty || isCancelClicked"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          label="Save"
          (click)="onSubmit()"
          [disabled]="promptForm.invalid || !isFormDirty"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>

    <!-- Form Section -->
    <form [formGroup]="promptForm" class="admin-form" #formContainer>
      <div class="form-container">
        <!-- Left Column -->
        <div class="form-grid left-column">
          <!-- Name Field -->
          <div class="form-field">
            <app-custom-input
              formControlName="name"
              label="Name"
              placeholder="Enter name"
              icon="pi-box"
              [required]="true"
              [showError]="
                !!(
                  promptForm.get('name')?.invalid &&
                  promptForm.get('name')?.touched
                )
              "
              [errorMessage]="getNameError()"
            >
            </app-custom-input>
          </div>

          <!-- Description Field -->
          <div class="form-field">
            <app-custom-input
              formControlName="description"
              label="Description"
              placeholder="Enter description"
              icon="pi-align-left"
            >
            </app-custom-input>
          </div>

          <!-- Organisation and Datasource fields (disabled) -->
          <app-custom-input
            *ngIf="showOrganisationDropdown"
            [ngModel]="selectedOrgName"
            [ngModelOptions]="{ standalone: true }"
            label="Organisation"
            placeholder="Organisation"
            icon="pi-building"
            [inputDisabled]="true"
          >
          </app-custom-input>

          <app-custom-input
            [ngModel]="selectedDatasourceName"
            [ngModelOptions]="{ standalone: true }"
            label="Datasource"
            placeholder="Datasource"
            icon="pi-database"
            [inputDisabled]="true"
          >
          </app-custom-input>

          <app-custom-input
            [ngModel]="selectedTabName"
            [ngModelOptions]="{ standalone: true }"
            label="Tab"
            placeholder="Tab"
            icon="pi-box"
            [inputDisabled]="true"
          >
          </app-custom-input>

          <!-- Section dropdown -->
          <div class="form-field">
            <app-custom-dropdown
              formControlName="section"
              label="Section"
              placeholder="Select Section"
              [options]="sections"
              optionLabel="name"
              optionValue="id"
              [filter]="true"
              filterBy="name"
              [required]="true"
              [showError]="
                !!(
                  promptForm.get('section')?.invalid &&
                  promptForm.get('section')?.touched
                )
              "
              errorMessage="Section is required"
            >
            </app-custom-dropdown>
          </div>

          <!-- Status -->
          <app-custom-toggle
            formControlName="status"
            label="Status"
            [trueValue]="1"
            [falseValue]="0"
            trueLabel="Active"
            falseLabel="Inactive"
          >
          </app-custom-toggle>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="confirmation-popup" *ngIf="showSaveConfirm">
  <div class="popup-content">
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-save"></i>
      </div>
      <h3>Confirm Update</h3>
    </div>

    <div class="standard-delete-section">
      <p class="delete-intro">Are you sure you want to update this prompt?</p>

      <div class="justification-section">
        <label for="saveJustification"
          >Justification <span class="required">*</span></label
        >
        <textarea
          id="saveJustification"
          [(ngModel)]="saveJustification"
          placeholder="Provide a reason for this update"
          rows="3"
          maxlength="500"
        ></textarea>
        <small class="char-count">{{ saveJustification.length }}/500</small>
      </div>
    </div>

    <div class="popup-actions">
      <button class="btn-cancel" (click)="cancelSave()">
        <i class="pi pi-times"></i>
        Cancel
      </button>
      <button
        class="btn-confirm"
        (click)="proceedSave()"
        [disabled]="!saveJustification.trim()"
      >
        <i class="pi pi-check"></i>
        Update
      </button>
    </div>
  </div>
</div>
