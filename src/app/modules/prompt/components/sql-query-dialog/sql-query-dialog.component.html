<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '800px' }"
  [draggable]="false"
  [resizable]="false"
  [header]="'PROMPT_MODULE.LOAD_VALUES_SQL_TITLE' | translate"
  styleClass="sql-query-dialog"
  (onHide)="onCancel()"
>
  <div class="dialog-content">
    <div class="info-message">
      <i class="pi pi-info-circle"></i>
      <span>{{ 'PROMPT_MODULE.SQL_QUERY_INFO' | translate }}</span>
    </div>

    <div class="form-field">
      <label for="sqlQuery">{{ 'PROMPT_MODULE.SQL_QUERY' | translate }}<span class="required">*</span></label>

      <!-- Monaco Editor Container -->
      <div
        class="editor-wrapper"
        [hidden]="isLoadingEditor || monacoLoadFailed"
      >
        <div
          #sqlQueryEditorContainer
          id="sql-query-editor-container"
          class="sql-editor"
        ></div>
      </div>

      <!-- Loading State -->
      <div class="editor-loading" *ngIf="isLoadingEditor && !monacoLoadFailed">
        <i class="pi pi-spin pi-spinner"></i>
        <span>{{ 'PROMPT_MODULE.LOADING_EDITOR' | translate }}</span>
      </div>

      <!-- Error Fallback -->
      <div class="editor-fallback" *ngIf="monacoLoadFailed">
        <textarea
          [(ngModel)]="sqlQuery"
          placeholder="SELECT DISTINCT column_name FROM schema.table_name WHERE condition"
          rows="12"
          class="fallback-textarea"
        >
        </textarea>
      </div>

      <small class="hint">
        <i class="pi pi-lightbulb"></i>
        {{ 'PROMPT_MODULE.SQL_EDITOR_HINT' | translate }}
      </small>
    </div>

    <div class="error-message-container" *ngIf="sqlError">
      <i class="pi pi-exclamation-triangle"></i>
      <span>{{ sqlError }}</span>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <button
      pButton
      type="button"
      [label]="'COMMON.CANCEL' | translate"
      class="p-button-outlined btn-cancel"
      (click)="onCancel()"
    ></button>
    <button
      pButton
      type="button"
      [label]="'PROMPT_MODULE.EXECUTE_AND_LOAD' | translate"
      class="p-button-primary btn-save"
      (click)="onExecute()"
      [disabled]="!sqlQuery.trim()"
    ></button>
  </ng-template>
</p-dialog>
