<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <!-- Header Section -->
    <div class="page-header">
      <div class="left-section">
        <button
          pButton
          class="p-button-text p-button-plain back-button"
          routerLink="/app/tab"
        >
          <i class="pi pi-arrow-left text-xl"></i>
        </button>
        <h2>{{ 'TAB.ADD_TITLE' | translate }}</h2>
      </div>
      <div class="warning-section" *ngIf="hasDuplicates">
        <div class="duplicate-warning">
          <i class="pi pi-exclamation-triangle"></i>
          <span
            >{{ 'TAB.DUPLICATE_WARNING' | translate }}</span
          >
        </div>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          [label]="'COMMON.CANCEL' | translate"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          [label]="'COMMON.SAVE' | translate"
          (click)="onSubmit()"
          [disabled]="tabForm.invalid || hasDuplicates || saving()"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>

    <!-- Form Section -->
    <form [formGroup]="tabForm" class="admin-form">
      <!-- Organisation and Datasource dropdowns -->
      <div class="form-grid">
        <div class="form-field" *ngIf="showOrganisationDropdown">
          <app-custom-dropdown
            formControlName="organisation"
            [label]="'COMMON.ORGANISATION' | translate"
            [placeholder]="'COMMON.SELECT_ORGANISATION' | translate"
            [options]="organisations"
            optionLabel="name"
            optionValue="id"
            [filter]="true"
            filterBy="name"
            [required]="true"
            [showError]="
              !!(
                tabForm.get('organisation')?.invalid &&
                tabForm.get('organisation')?.touched
              )
            "
            [errorMessage]="'VALIDATION.ORGANISATION_REQUIRED' | translate"
            (ngModelChange)="
              onOrganisationChange({
                value: tabForm.get('organisation')?.value,
              })
            "
          >
          </app-custom-dropdown>
        </div>

        <div class="form-field">
          <app-custom-dropdown
            formControlName="datasource"
            [label]="'COMMON.DATASOURCE' | translate"
            [placeholder]="'COMMON.SELECT_DATASOURCE' | translate"
            [options]="datasources"
            optionLabel="name"
            optionValue="id"
            [filter]="true"
            filterBy="name"
            [required]="true"
            [showError]="
              !!(
                tabForm.get('datasource')?.invalid &&
                tabForm.get('datasource')?.touched
              )
            "
            [errorMessage]="'VALIDATION.FIELD_REQUIRED' | translate"
            (ngModelChange)="
              onDatasourceChange({ value: tabForm.get('datasource')?.value })
            "
          >
          </app-custom-dropdown>
        </div>

        <!-- Tab Groups -->
        <div
          class="form-field fields-container"
          *ngIf="tabForm.get('datasource')?.value"
        >
          <div class="fields-header">
            <label>{{ 'TAB.TABS_LABEL' | translate }}<span class="required">*</span></label>
            <div class="button-group">
              <button
                pButton
                type="button"
                icon="pi pi-plus"
                class="p-button-rounded p-button-text add-btn"
                (click)="addTabGroup()"
              ></button>
            </div>
          </div>

          <div class="fields-list" formArrayName="tabs">
            <div
              *ngFor="
                let tabGroup of tabGroups.controls;
                let i = index;
                trackBy: trackByIndex
              "
              [formGroupName]="i"
              class="mapping-row"
              [class.highlight-animation]="
                i === lastAddedTabIndex && isNewlyAdded
              "
              [class.duplicate]="isDuplicateRow(i)"
            >
              <span class="index-number">{{ i + 1 }}</span>

              <div class="mapping-inputs">
                <!-- Name field -->
                <div class="form-field">
                  <app-custom-input
                    formControlName="name"
                    [label]="'COMMON.NAME' | translate"
                    [placeholder]="'TAB.ENTER_TAB_NAME' | translate"
                    icon="pi-box"
                    [required]="true"
                    [showError]="
                      !!(
                        tabGroup.get('name')?.invalid &&
                        tabGroup.get('name')?.touched
                      )
                    "
                    [errorMessage]="getNameError(tabGroup.get('name'))"
                  >
                  </app-custom-input>
                </div>

                <!-- Description field -->
                <div class="form-field">
                  <app-custom-input
                    formControlName="description"
                    [label]="'COMMON.DESCRIPTION' | translate"
                    [placeholder]="'COMMON.ENTER_DESCRIPTION' | translate"
                    icon="pi-align-left"
                  >
                  </app-custom-input>
                </div>
              </div>

              <button
                pButton
                type="button"
                icon="pi pi-trash"
                class="p-button-rounded p-button-text p-button-danger delete-button"
                (click)="removeTabGroup(i)"
              ></button>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
