<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <!-- Header Section -->
    <div class="page-header">
      <div class="left-section">
        <button
          pButton
          class="p-button-text back-button"
          routerLink="/app/datasource"
        >
          <i class="pi pi-arrow-left"></i>
        </button>
        <h2>Add Datasource</h2>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          label="Cancel"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          label="Save"
          (click)="onSubmit()"
          [disabled]="!isFormValid()"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>

    <!-- Form Section -->
    <form [formGroup]="datasourceForm" class="admin-form">
      <div class="left-section">
        <!-- Main form grid -->
        <div class="form-grid">
          <!-- Name Field -->
          <app-custom-input
            formControlName="name"
            label="Name"
            placeholder="Enter name"
            icon="pi-database"
            [required]="true"
            [showError]="
              !!(
                datasourceForm.get('name')?.invalid &&
                datasourceForm.get('name')?.touched
              )
            "
            [errorMessage]="getErrorMessage('name')"
          >
          </app-custom-input>

          <!-- Description Field -->
          <app-custom-input
            formControlName="description"
            label="Description"
            placeholder="Enter description"
            icon="pi-align-left"
            [showError]="
              !!(
                datasourceForm.get('description')?.invalid &&
                datasourceForm.get('description')?.touched
              )
            "
            [errorMessage]="getErrorMessage('description')"
          >
          </app-custom-input>

          <!-- Organisation Dropdown -->
          <app-custom-dropdown
            *ngIf="showOrganisationDropdown"
            formControlName="organisation"
            label="Organisation"
            placeholder="Select Organisation"
            [options]="organisations"
            optionLabel="name"
            optionValue="id"
            [filter]="true"
            filterBy="name"
            [required]="true"
            [showError]="
              !!(
                datasourceForm.get('organisation')?.invalid &&
                datasourceForm.get('organisation')?.touched
              )
            "
            errorMessage="Organisation is required"
          >
          </app-custom-dropdown>

          <!-- Type Field (disabled) -->
          <app-custom-input
            formControlName="type"
            label="Type"
            icon="pi-database"
            [inputDisabled]="true"
          >
          </app-custom-input>

          <!-- Host Field -->
          <app-custom-input
            formControlName="host"
            label="Host"
            placeholder="Enter database host"
            icon="pi-desktop"
            [required]="true"
            [showError]="
              !!(
                datasourceForm.get('host')?.invalid &&
                datasourceForm.get('host')?.touched
              )
            "
            [errorMessage]="getErrorMessage('host')"
          >
          </app-custom-input>

          <!-- Port Field -->
          <app-custom-input
            formControlName="port"
            label="Port"
            placeholder="Enter database port"
            icon="pi-hashtag"
            type="number"
            [required]="true"
            [showError]="
              !!(
                datasourceForm.get('port')?.invalid &&
                datasourceForm.get('port')?.touched
              )
            "
            [errorMessage]="getErrorMessage('port')"
          >
          </app-custom-input>

          <!-- Database Name Field -->
          <app-custom-input
            formControlName="database"
            label="Database Name"
            placeholder="Enter database name"
            icon="pi-database"
            [required]="true"
            [showError]="
              !!(
                datasourceForm.get('database')?.invalid &&
                datasourceForm.get('database')?.touched
              )
            "
            [errorMessage]="getErrorMessage('database')"
          >
          </app-custom-input>

          <!-- Username Field -->
          <app-custom-input
            formControlName="username"
            label="Username"
            placeholder="Enter database username"
            icon="pi-user"
            [required]="true"
            [showError]="
              !!(
                datasourceForm.get('username')?.invalid &&
                datasourceForm.get('username')?.touched
              )
            "
            [errorMessage]="getErrorMessage('username')"
          >
          </app-custom-input>

          <!-- Database Password Field -->
          <app-custom-input
            formControlName="password"
            label="Password"
            placeholder="Enter database password"
            icon="pi-lock"
            [required]="true"
            [showPasswordToggle]="true"
            [showError]="
              !!(
                datasourceForm.get('password')?.invalid &&
                datasourceForm.get('password')?.touched
              )
            "
            [errorMessage]="getErrorMessage('password')"
          >
          </app-custom-input>

          <!-- Connection Test -->
          <div class="form-field">
            <div class="connection-test-section">
              <a
                class="test-connection-link"
                (click)="testConnection()"
                [class.disabled]="
                  !isConnectionFieldsValid() || connectionTestLoading
                "
              >
                <i
                  class="pi"
                  [ngClass]="{
                    'pi-spin pi-spinner': connectionTestLoading,
                    'pi-check-circle': connectionTestResult === 'success',
                    'pi-times-circle': connectionTestResult === 'failed',
                    'pi-bolt': !connectionTestLoading && !connectionTestResult,
                  }"
                ></i>
                {{
                  connectionTestLoading
                    ? 'Testing...'
                    : connectionTestResult === 'success'
                      ? 'Connection Successful'
                      : connectionTestResult === 'failed'
                        ? 'Connection Failed - Retry'
                        : 'Test Connection'
                }}
              </a>
              <small
                class="connection-hint"
                *ngIf="!connectionTested && !connectionTestLoading"
              >
                Connection test required before saving
              </small>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>
