<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <!-- Header Section -->
    <div class="page-header">
      <div class="left-section">
        <button
          pButton
          class="p-button-text back-button"
          routerLink="/app/connections"
        >
          <i class="pi pi-arrow-left"></i>
        </button>
        <h2>{{ 'CONNECTION.ADD_TITLE' | translate }}</h2>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          [label]="'COMMON.CANCEL' | translate"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty"
          (click)="onCancel()"
        ></button>
        <button
          *hasPermission="'dbConnections'; level: 'write'"
          pButton
          class="p-button-primary btn-save"
          type="submit"
          [label]="'COMMON.SAVE' | translate"
          (click)="onSubmit()"
          [disabled]="connectionForm.invalid || saving()"
        >
          <i
            class="pi mr-2"
            [ngClass]="saving() ? 'pi-spin pi-spinner' : 'pi-save'"
          ></i>
        </button>
      </div>
    </div>

    <!-- Form Section -->
    <form [formGroup]="connectionForm" class="admin-form" #formContainer>
      <div class="form-grid">
        <!-- Name Field -->
        <app-custom-input
          formControlName="name"
          [label]="'COMMON.NAME' | translate"
          [placeholder]="'CONNECTION.ENTER_NAME' | translate"
          icon="pi-id-card"
          [required]="true"
          [showError]="
            !!(
              connectionForm.get('name')?.invalid &&
              connectionForm.get('name')?.touched
            )
          "
          [errorMessage]="getNameError()"
        >
        </app-custom-input>

        <!-- Description Field -->
        <app-custom-input
          formControlName="description"
          [label]="'COMMON.DESCRIPTION' | translate"
          [placeholder]="'CONNECTION.ENTER_DESCRIPTION' | translate"
          icon="pi-align-left"
        >
        </app-custom-input>

        <!-- Datasource Dropdown — server-driven -->
        <app-custom-dropdown
          formControlName="datasource"
          [label]="'CONNECTION.DATASOURCE' | translate"
          [placeholder]="'CONNECTION.SELECT_DATASOURCE' | translate"
          [serverMode]="true"
          [fetcher]="loadDatasourcesPage"
          [pageSize]="10"
          [preloadedItems]="preloadedDatasources"
          [preloadedTotal]="preloadedDatasourcesTotal"
          optionLabel="name"
          optionValue="id"
          [filter]="true"
          filterBy="name"
          [required]="true"
          [showError]="
            !!(
              connectionForm.get('datasource')?.invalid &&
              connectionForm.get('datasource')?.touched
            )
          "
          [errorMessage]="'VALIDATION.DATASOURCE_REQUIRED' | translate"
          icon="pi-database"
          (onChangeEvent)="onDatasourceChange()"
        >
        </app-custom-dropdown>

        <!-- Engine badge — surfaces the parent datasource's dbType
             so the user knows which engine they're entering creds
             for. Stays out of the way until a datasource is picked. -->
        <div class="dbtype-badge" *ngIf="selectedDbType">
          <i class="pi pi-database" aria-hidden="true"></i>
          <span>
            {{ 'CONNECTION.CREDENTIALS_FOR' | translate }}
            <strong>{{ selectedDbTypeLabel }}</strong>
          </span>
        </div>

        <!-- DB Username -->
        <app-custom-input
          formControlName="dbUsername"
          [label]="'CONNECTION.DATASOURCE_USERNAME' | translate"
          [placeholder]="usernamePlaceholderKey | translate"
          icon="pi-user"
          [required]="true"
          [showError]="
            !!(
              connectionForm.get('dbUsername')?.invalid &&
              connectionForm.get('dbUsername')?.touched
            )
          "
          [errorMessage]="'VALIDATION.DATASOURCE_USERNAME_REQUIRED' | translate"
        >
        </app-custom-input>

        <!-- DB Password -->
        <app-custom-input
          formControlName="dbPassword"
          [label]="'CONNECTION.DATASOURCE_PASSWORD' | translate"
          [placeholder]="passwordPlaceholderKey | translate"
          icon="pi-lock"
          [required]="true"
          [showPasswordToggle]="true"
          [showError]="
            !!(
              connectionForm.get('dbPassword')?.invalid &&
              connectionForm.get('dbPassword')?.touched
            )
          "
          [errorMessage]="'VALIDATION.DATASOURCE_PASSWORD_REQUIRED' | translate"
        >
        </app-custom-input>
      </div>
    </form>
  </div>
</div>
