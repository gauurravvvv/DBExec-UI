<p-dialog
  [header]="editingFilter ? ('ANALYSES.EDIT_FILTER' | translate) : ('ANALYSES.ADD_FILTER' | translate)"
  [(visible)]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '520px' }"
  styleClass="filter-config-dialog"
  [closable]="true"
  (onHide)="onDialogHide()"
>
  <div class="filter-dialog-form">
    <!-- Column Selection -->
    <div class="filter-dialog-field">
      <app-custom-dropdown
        [options]="datasetFields"
        [(ngModel)]="filterDialogColumn"
        [label]="'ANALYSES.COLUMN' | translate"
        optionLabel="columnToView"
        [placeholder]="'ANALYSES.SELECT_DATASET_COLUMN' | translate"
        [filter]="true"
        filterBy="columnToView"
        [required]="true"
        [autoDisplayFirst]="false"
        appendTo="body"
        (onChangeEvent)="onFilterColumnChange()"
      ></app-custom-dropdown>
    </div>

    <!-- Filter Name -->
    <div class="filter-dialog-field">
      <app-custom-input
        [(ngModel)]="filterDialogName"
        [label]="'ANALYSES.DISPLAY_NAME' | translate"
        icon="pi-tag"
        [placeholder]="'ANALYSES.FILTER_LABEL_PLACEHOLDER' | translate"
      ></app-custom-input>
    </div>

    <!-- Type Selection Row -->
    <div class="filter-dialog-row">
      <div class="filter-dialog-field">
        <app-custom-dropdown
          [options]="filterTypeOptions"
          [(ngModel)]="filterDialogType"
          [label]="'ANALYSES.FILTER_TYPE' | translate"
          optionValue="value"
          [placeholder]="'ANALYSES.SELECT_TYPE' | translate"
          [required]="true"
          [autoDisplayFirst]="false"
          appendTo="body"
          (onChangeEvent)="onFilterTypeChange()"
        ></app-custom-dropdown>
      </div>
      <div class="filter-dialog-field">
        <app-custom-dropdown
          [options]="controlTypeOptions"
          [(ngModel)]="filterDialogControl"
          [label]="'ANALYSES.CONTROL_TYPE' | translate"
          optionValue="value"
          [placeholder]="'ANALYSES.SELECT_CONTROL' | translate"
          [required]="true"
          [autoDisplayFirst]="false"
          appendTo="body"
        ></app-custom-dropdown>
      </div>
    </div>

    <!-- Operator & Null Handling Row -->
    <div class="filter-dialog-row" *ngIf="filterDialogType">
      <div class="filter-dialog-field">
        <app-custom-dropdown
          [options]="operatorOptions"
          [(ngModel)]="filterDialogOperator"
          [label]="'ANALYSES.MATCH_OPERATOR' | translate"
          optionValue="value"
          [placeholder]="'ANALYSES.SELECT_OPERATOR' | translate"
          [autoDisplayFirst]="false"
          appendTo="body"
        ></app-custom-dropdown>
      </div>
      <div class="filter-dialog-field">
        <app-custom-dropdown
          [options]="nullOptions"
          [(ngModel)]="filterDialogNullOption"
          [label]="'ANALYSES.NULL_HANDLING' | translate"
          optionValue="value"
          [autoDisplayFirst]="false"
          appendTo="body"
        ></app-custom-dropdown>
      </div>
    </div>

    <!-- Default Value Section — Category -->
    <div class="filter-dialog-field" *ngIf="filterDialogType === 'category'">
      <app-custom-multiselect
        [options]="filterDialogCategoryValues"
        [(ngModel)]="filterDialogDefaultValue"
        [label]="'ANALYSES.DEFAULT_VALUES' | translate"
        optionValue="value"
        [placeholder]="
          isLoadingFilterValues
            ? ('ANALYSES.LOADING_VALUES' | translate)
            : ('ANALYSES.SELECT_DEFAULT_VALUES' | translate)
        "
        [filter]="true"
        display="chip"
        appendTo="body"
      ></app-custom-multiselect>
      <small
        class="field-hint"
        *ngIf="
          filterDialogCategoryValues.length === 0 && !isLoadingFilterValues
        "
      >
        <i class="pi pi-info-circle"></i> {{ 'ANALYSES.LOAD_DATA_TO_SEE_VALUES' | translate }}
      </small>
    </div>

    <!-- Default Value Section — Numeric Equality -->
    <div
      class="filter-dialog-field"
      *ngIf="filterDialogType === 'numeric_equality'"
    >
      <app-custom-number
        [(ngModel)]="filterDialogDefaultValue"
        [label]="'ANALYSES.DEFAULT_VALUE_LABEL' | translate"
        [placeholder]="'ANALYSES.ENTER_DEFAULT_NUMBER' | translate"
      ></app-custom-number>
    </div>

    <!-- Default Value Section — Numeric Range -->
    <div class="filter-dialog-row" *ngIf="filterDialogType === 'numeric_range'">
      <div class="filter-dialog-field">
        <app-custom-number
          [(ngModel)]="filterDialogDefaultValue.min"
          [label]="'ANALYSES.RANGE_MIN' | translate"
          [placeholder]="'ANALYSES.MIN' | translate"
        ></app-custom-number>
      </div>
      <div class="filter-dialog-field">
        <app-custom-number
          [(ngModel)]="filterDialogDefaultValue.max"
          [label]="'ANALYSES.RANGE_MAX' | translate"
          [placeholder]="'ANALYSES.MAX' | translate"
        ></app-custom-number>
      </div>
    </div>

    <!-- Date Format & Time Options — for time-based filters -->
    <div
      class="filter-dialog-row"
      *ngIf="
        filterDialogType === 'time_equality' ||
        filterDialogType === 'time_range'
      "
    >
      <div class="filter-dialog-field">
        <app-custom-dropdown
          [(ngModel)]="filterDialogDateFormat"
          [options]="dateFormatOptions"
          optionLabel="label"
          optionValue="value"
          [label]="'ANALYSES.DATE_FORMAT' | translate"
          appendTo="body"
          (onChangeEvent)="onDateFormatChange()"
        ></app-custom-dropdown>
      </div>
      <div class="filter-dialog-field">
        <app-custom-toggle
          [ngModel]="filterDialogIncludeTime"
          (ngModelChange)="
            filterDialogIncludeTime = $event; onIncludeTimeChange()
          "
          [label]="'ANALYSES.INCLUDE_TIME' | translate"
          [trueLabel]="'ANALYSES.DATE_AND_TIME' | translate"
          [falseLabel]="'ANALYSES.DATE_ONLY' | translate"
        ></app-custom-toggle>
      </div>
    </div>

    <!-- Default Value Section — Time Equality -->
    <div
      class="filter-dialog-field"
      *ngIf="filterDialogType === 'time_equality'"
    >
      <app-custom-calendar
        [(ngModel)]="filterDialogDefaultValue"
        [label]="'ANALYSES.DEFAULT_DATE' | translate"
        [placeholder]="
          filterDialogIncludeTime ? ('ANALYSES.SELECT_DATE_TIME' | translate) : ('ANALYSES.SELECT_DATE' | translate)
        "
        [showTime]="filterDialogIncludeTime"
        [showIcon]="true"
        [dateFormat]="filterDialogDateFormat"
        appendTo="body"
      ></app-custom-calendar>
    </div>

    <!-- Default Value Section — Time Range -->
    <div class="filter-dialog-field" *ngIf="filterDialogType === 'time_range'">
      <app-custom-daterange
        [(ngModel)]="filterDialogDefaultValue"
        [label]="'ANALYSES.DATE_RANGE' | translate"
        [placeholder]="
          filterDialogIncludeTime
            ? ('ANALYSES.SELECT_DATE_TIME_RANGE' | translate)
            : ('ANALYSES.SELECT_DATE_RANGE' | translate)
        "
        [showTime]="filterDialogIncludeTime"
        [showIcon]="true"
        [dateFormat]="filterDialogDateFormat"
        [numberOfMonths]="2"
        appendTo="body"
      ></app-custom-daterange>
    </div>

    <!-- Placeholder Text -->
    <div class="filter-dialog-field" *ngIf="filterDialogType">
      <app-custom-input
        [(ngModel)]="filterDialogPlaceholder"
        [label]="'ANALYSES.PLACEHOLDER_TEXT' | translate"
        icon="pi-pencil"
        [placeholder]="'ANALYSES.PLACEHOLDER_HINT' | translate"
      ></app-custom-input>
    </div>

    <!-- Options Row -->
    <div class="filter-dialog-options">
      <app-custom-toggle
        [(ngModel)]="filterDialogEnabled"
        [label]="'COMMON.STATUS' | translate"
        [trueLabel]="'ANALYSES.ENABLED' | translate"
        [falseLabel]="'ANALYSES.DISABLED' | translate"
      ></app-custom-toggle>
      <app-custom-toggle
        [(ngModel)]="filterDialogMandatory"
        [label]="'ANALYSES.REQUIRED' | translate"
        [trueLabel]="'ANALYSES.REQUIRED' | translate"
        [falseLabel]="'ANALYSES.OPTIONAL' | translate"
      ></app-custom-toggle>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="dialog-footer">
      <button class="btn-cancel" type="button" (click)="cancel()">
        <i class="pi pi-times"></i>
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button
        class="btn-primary"
        type="button"
        (click)="save()"
        [disabled]="
          !filterDialogColumn ||
          !filterDialogType ||
          !filterDialogControl ||
          isSavingFilter
        "
      >
        <i
          class="pi"
          [ngClass]="isSavingFilter ? 'pi-spin pi-spinner' : 'pi-check'"
        ></i>
        {{
          isSavingFilter
            ? ('ANALYSES.SAVING' | translate)
            : editingFilter
              ? ('ANALYSES.UPDATE_FILTER' | translate)
              : ('ANALYSES.ADD_FILTER' | translate)
        }}
      </button>
    </div>
  </ng-template>
</p-dialog>
