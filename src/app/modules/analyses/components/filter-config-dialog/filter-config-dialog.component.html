<p-dialog
  header="{{ editingFilter ? 'Edit Filter' : 'Add Filter' }}"
  [(visible)]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '460px' }"
  styleClass="filter-config-dialog"
  [closable]="true"
  (onHide)="cancelFilterDialog()"
>
  <div class="filter-dialog-form">
    <!-- Column Selection -->
    <div class="filter-dialog-field">
      <app-custom-dropdown
        [(ngModel)]="filterDialogColumn"
        label="Column"
        [required]="true"
        [options]="datasetFields"
        optionLabel="columnToView"
        [optionValue]="null"
        placeholder="Select a dataset column"
        [filter]="true"
        filterBy="columnToView"
        (onChangeEvent)="onFilterColumnChange()"
      ></app-custom-dropdown>
    </div>

    <!-- Filter Name -->
    <div class="filter-dialog-field">
      <app-custom-input
        [(ngModel)]="filterDialogName"
        label="Display Name"
        placeholder="Filter label (defaults to column name)"
      ></app-custom-input>
    </div>

    <!-- Type Selection Row -->
    <div class="filter-dialog-row">
      <div class="filter-dialog-field">
        <app-custom-dropdown
          [(ngModel)]="filterDialogType"
          label="Filter Type"
          [required]="true"
          [options]="filterTypeOptions"
          placeholder="Select type"
          (onChangeEvent)="onFilterTypeChange()"
        ></app-custom-dropdown>
      </div>
      <div class="filter-dialog-field">
        <app-custom-dropdown
          [(ngModel)]="filterDialogControl"
          label="Control Type"
          [required]="true"
          [options]="controlTypeOptions"
          placeholder="Select control"
        ></app-custom-dropdown>
      </div>
    </div>

    <!-- Options Row -->
    <div class="filter-dialog-options">
      <app-custom-toggle
        [(ngModel)]="filterDialogEnabled"
        label="Status"
        trueLabel="Enabled"
        falseLabel="Disabled"
      ></app-custom-toggle>
      <app-custom-toggle
        [(ngModel)]="filterDialogMandatory"
        label="Required"
        trueLabel="Required"
        falseLabel="Optional"
      ></app-custom-toggle>
    </div>
  </div>

  <ng-template pTemplate="footer">
    <div class="dialog-footer">
      <button class="btn-cancel" type="button" (click)="cancelFilterDialog()">
        <i class="pi pi-times"></i>
        Cancel
      </button>
      <button
        class="btn-primary"
        type="button"
        (click)="saveFilterDialog()"
        [disabled]="
          !filterDialogColumn || !filterDialogType || !filterDialogControl
        "
      >
        <i class="pi pi-check"></i>
        {{ editingFilter ? 'Update Filter' : 'Add Filter' }}
      </button>
    </div>
  </ng-template>
</p-dialog>
