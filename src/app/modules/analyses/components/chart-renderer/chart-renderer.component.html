<!-- Table visual — renders with whatever data is available; does not
     require axis field mapping (it shows all columns of the dataset). -->
<ng-container *ngIf="visual.chartType && isTableChartType(visual.chartType)">
  <app-table-visual
    [chartConfig]="chartConfigRef"
    [chartWidth]="chartWidth"
    [chartHeight]="chartHeight"
    [data]="getDisplayData(visual)"
  ></app-table-visual>
</ng-container>

<!-- Standard charts: require field mapping -->
<ng-container
  *ngIf="
    visual.chartType &&
    !isTableChartType(visual.chartType) &&
    hasRequiredChartFields(visual)
  "
>
  <!-- Card chart (non-ECharts) -->
  <app-configurable-card-chart
    *ngIf="isCardChartType(visual.chartType); else echartBlock"
    [showConfigPanel]="false"
    [chartWidth]="chartWidth"
    [chartHeight]="chartHeight"
    [chartConfig]="chartConfigRef"
    [data]="visual.chartData"
  ></app-configurable-card-chart>

  <ng-template #echartBlock>
    <app-echart-visual
      [chartType]="visual.chartType!"
      [chartConfig]="chartConfigRef"
      [chartWidth]="chartWidth"
      [chartHeight]="chartHeight"
      [data]="getDisplayData(visual)"
    ></app-echart-visual>
  </ng-template>
</ng-container>

<!--
  Globe / 3D-line charts previously had a "render with dummy data
  when no field mapping" path so users could see the chart shape
  before mapping. That path was removed because dummy data was
  triggering misleading tooltips and persisting after columns were
  deleted. These charts now follow the standard "no axes → empty
  state" rule like every other chart type.
-->
