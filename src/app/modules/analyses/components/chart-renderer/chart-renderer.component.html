<!-- Standard charts: render when required fields are mapped -->
<ng-container
  *ngIf="
    visual.chartType &&
    hasRequiredChartFields(visual) &&
    !isLines3dChartType(visual.chartType) &&
    !isPolygons3dChartType(visual.chartType)
  "
>
  <app-configurable-bar-chart
    *ngIf="isBarChartType(visual.chartType)"
    [showConfigPanel]="false"
    [chartWidth]="chartWidth"
    [chartHeight]="chartHeight"
    [chartConfig]="visual.config"
    [chartType]="visual.chartType"
    [data]="visual.chartData"
  ></app-configurable-bar-chart>

  <app-configurable-line-chart
    *ngIf="isLineChartType(visual.chartType)"
    [showConfigPanel]="false"
    [chartWidth]="chartWidth"
    [chartHeight]="chartHeight"
    [chartConfig]="visual.config"
    [data]="visual.chartData"
  ></app-configurable-line-chart>

  <app-configurable-area-chart
    *ngIf="isAreaChartType(visual.chartType)"
    [showConfigPanel]="false"
    [chartWidth]="chartWidth"
    [chartHeight]="chartHeight"
    [chartConfig]="visual.config"
    [chartType]="visual.chartType"
    [data]="visual.chartData"
  ></app-configurable-area-chart>

  <app-configurable-polar-chart
    *ngIf="isPolarChartType(visual.chartType)"
    [showConfigPanel]="false"
    [chartWidth]="chartWidth"
    [chartHeight]="chartHeight"
    [chartConfig]="visual.config"
    [data]="visual.chartData"

  <app-configurable-pie-chart
    *ngIf="isPieChartType(visual.chartType)"
    [showConfigPanel]="false"
    [chartWidth]="chartWidth"
    [chartHeight]="chartHeight"
    [chartConfig]="visual.config"
    [chartType]="visual.chartType"
    [data]="visual.chartData"
  ></app-configurable-pie-chart>

  <app-configurable-gauge-chart
    *ngIf="isGaugeChartType(visual.chartType)"
    [showConfigPanel]="false"
    [chartWidth]="chartWidth"
    [chartHeight]="chartHeight"
    [chartConfig]="visual.config"
    [chartType]="visual.chartType"

<!-- Globe charts: show immediately with dummy data (no field mapping required) -->
<ng-container
  *ngIf="
    visual.chartType &&
    (isLines3dChartType(visual.chartType) ||
      isPolygons3dChartType(visual.chartType))
  "
>
  <app-configurable-lines3d-chart
    *ngIf="isLines3dChartType(visual.chartType)"
    [showConfigPanel]="false"
    [chartWidth]="chartWidth"
    [chartHeight]="chartHeight"
    [chartConfig]="visual.config"
    [data]="getDisplayData(visual)"
  ></app-configurable-lines3d-chart>

  <app-configurable-polygons3d-chart
    *ngIf="isPolygons3dChartType(visual.chartType)"
    [showConfigPanel]="false"
    [chartWidth]="chartWidth"
    [chartHeight]="chartHeight"
    [chartConfig]="visual.config"
    [data]="getDisplayData(visual)"
  ></app-configurable-polygons3d-chart>
</ng-container>
