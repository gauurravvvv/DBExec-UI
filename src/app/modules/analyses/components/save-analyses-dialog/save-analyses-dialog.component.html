<div class="save-analysis-popup" *ngIf="visible">
  <div class="popup-content">
    <h3>{{ dialogTitle }}</h3>
    <form [formGroup]="analysisForm" class="analysis-form">
      <!-- Analysis Name -->
      <div class="form-field">
        <app-custom-input
          formControlName="name"
          label="Name"
          placeholder="Enter analysis name"
          icon="pi-chart-bar"
          [required]="true"
          [showError]="
            !!(
              analysisForm.get('name')?.invalid &&
              analysisForm.get('name')?.touched
            )
          "
          [errorMessage]="getNameError()"
        >
        </app-custom-input>
      </div>

      <!-- Description -->
      <div class="form-field">
        <app-custom-input
          formControlName="description"
          label="Description"
          placeholder="Enter analysis description (optional)"
          icon="pi-align-left"
        >
        </app-custom-input>
        <small class="char-count">
          {{ analysisForm.get('description')?.value?.length || 0 }}/500
          characters
        </small>
      </div>

      <!-- Justification -->
      <div class="form-field justification-field">
        <label for="saveJustification">Justification <span class="required">*</span></label>
        <textarea
          id="saveJustification"
          [(ngModel)]="saveJustification"
          [ngModelOptions]="{ standalone: true }"
          placeholder="Provide a reason for this update"
          rows="3"
          maxlength="500"
        ></textarea>
        <small class="char-count">{{ saveJustification.length }}/500</small>
      </div>

      <div class="popup-actions">
        <button
          pButton
          type="button"
          label="Cancel"
          class="p-button-outlined btn-cancel"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          type="submit"
          label="Save Analysis"
          class="p-button-primary btn-save"
          [disabled]="analysisForm.invalid || !saveJustification.trim()"
          (click)="onSubmit()"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </form>
  </div>
</div>
