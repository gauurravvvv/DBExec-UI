<div class="save-analysis-popup" *ngIf="visible">
  <div class="popup-content">
    <h3>{{ dialogTitle }}</h3>
    <form [formGroup]="analysisForm" class="analysis-form">
      <!-- Analysis Name -->
      <div class="form-field">
        <app-custom-input
          formControlName="name"
          [label]="'COMMON.NAME' | translate"
          [placeholder]="'ANALYSES.ENTER_ANALYSIS_NAME' | translate"
          icon="pi-chart-bar"
          [required]="true"
          [showError]="
            !!(
              analysisForm.get('name')?.invalid &&
              analysisForm.get('name')?.touched
            )
          "
          [errorMessage]="getNameError()"

        >
        </app-custom-input>
      </div>

      <!-- Description -->
      <div class="form-field">
        <app-custom-input
          formControlName="description"
          [label]="'COMMON.DESCRIPTION' | translate"
          [placeholder]="'ANALYSES.ENTER_ANALYSIS_DESCRIPTION' | translate"
          icon="pi-align-left"
        >
        </app-custom-input>
        <small class="char-count">
          {{ analysisForm.get('description')?.value?.length || 0 }}/500
          {{ 'ANALYSES.CHARACTERS' | translate }}
        </small>
      </div>

      <!-- Justification (for updates only) -->
      <div class="form-field justification-field" *ngIf="showJustification">
        <label for="saveJustification"
          >{{ 'COMMON.JUSTIFICATION' | translate }} <span class="required">*</span></label
        >
        <textarea
          id="saveJustification"
          [(ngModel)]="saveJustification"
          [ngModelOptions]="{ standalone: true }"
          [placeholder]="'ANALYSES.PROVIDE_UPDATE_REASON' | translate"
          rows="3"
          maxlength="500"
        ></textarea>
        <small class="char-count">{{ saveJustification.length }}/500</small>
      </div>

      <div class="popup-actions">
        <button
          pButton
          type="button"
          [label]="'COMMON.CANCEL' | translate"
          class="p-button-outlined btn-cancel"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          type="submit"
          [label]="'ANALYSES.SAVE_ANALYSIS' | translate"
          class="p-button-primary btn-save"
          [disabled]="
            analysisForm.invalid ||
            (showJustification && !saveJustification.trim())
          "
          (click)="onSubmit()"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </form>
  </div>
</div>
