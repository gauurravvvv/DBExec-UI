<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <!-- Header Section -->
    <div class="page-header">
      <div class="left-section">
        <button
          pButton
          class="p-button-text back-button"
          routerLink="/app/users"
        >
          <i class="pi pi-arrow-left"></i>
        </button>
        <h2>Edit User</h2>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          label="Cancel"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty || isCancelClicked"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          label="Save"
          [disabled]="userForm.invalid || !isFormDirty"
          (click)="onSubmit()"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>

    <!-- Form Section -->
    <form [formGroup]="userForm" class="admin-form">
      <div class="form-grid">
        <!-- First Name -->
        <app-custom-input
          formControlName="firstName"
          label="First Name"
          placeholder="Enter first name"
          icon="pi-user"
          [required]="true"
          [showError]="
            !!(
              userForm.get('firstName')?.invalid &&
              userForm.get('firstName')?.touched
            )
          "
          [errorMessage]="getFirstNameError()"
        >
        </app-custom-input>

        <!-- Last Name -->
        <app-custom-input
          formControlName="lastName"
          label="Last Name"
          placeholder="Enter last name"
          icon="pi-user"
          [required]="true"
          [showError]="
            !!(
              userForm.get('lastName')?.invalid &&
              userForm.get('lastName')?.touched
            )
          "
          [errorMessage]="getLastNameError()"
        >
        </app-custom-input>

        <!-- Organisation (readonly) -->
        <div class="form-field" *ngIf="showOrganisationDropdown">
          <label for="organisation">Organisation</label>
          <span class="p-input-icon-left">
            <i class="pi pi-building"></i>
            <input
              id="organisation"
              type="text"
              pInputText
              [value]="selectedOrgName"
              placeholder="Organisation"
              readonly
              class="readonly"
            />
          </span>
        </div>

        <!-- Username (readonly) -->
        <div class="form-field">
          <label for="username">Username <span class="required">*</span></label>
          <span class="p-input-icon-left">
            <i class="pi pi-user-edit"></i>
            <input
              id="username"
              type="text"
              pInputText
              formControlName="username"
              placeholder="Enter username"
              readonly
              class="readonly"
            />
          </span>
        </div>

        <!-- Email -->
        <app-custom-input
          formControlName="email"
          label="Email"
          placeholder="Enter email address"
          icon="pi-envelope"
          type="email"
          [required]="true"
          [showError]="
            !!(userForm.get('email')?.invalid && userForm.get('email')?.touched)
          "
          [errorMessage]="
            userForm.get('email')?.errors?.['required']
              ? 'Email is required'
              : userForm.get('email')?.errors?.['email']
                ? 'Please enter a valid email'
                : ''
          "
        >
        </app-custom-input>

        <!-- Status -->
        <div>
          <app-custom-toggle
            formControlName="status"
            label="Status"
            [trueValue]="1"
            [falseValue]="0"
            trueLabel="Active"
            falseLabel="Inactive"
          >
          </app-custom-toggle>
          <small *ngIf="isLocked" class="locked-note">
            <i class="pi pi-lock"></i>
            Account is locked. Unlock from the list page to change status.
          </small>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="confirmation-popup" *ngIf="showSaveConfirm">
  <div class="popup-content">
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-save"></i>
      </div>
      <h3>Confirm Update</h3>
    </div>
    <div class="standard-delete-section">
      <p class="delete-intro">Are you sure you want to update this user?</p>
      <div class="justification-section">
        <label for="saveJustification"
          >Justification <span class="required">*</span></label
        >
        <textarea
          id="saveJustification"
          [(ngModel)]="saveJustification"
          placeholder="Provide a reason for this update"
          rows="3"
          maxlength="500"
        ></textarea>
        <small class="char-count">{{ saveJustification.length }}/500</small>
      </div>
    </div>
    <div class="popup-actions">
      <button class="btn-cancel" (click)="cancelSave()">
        <i class="pi pi-times"></i>
        Cancel
      </button>
      <button
        class="btn-confirm"
        (click)="proceedSave()"
        [disabled]="!saveJustification.trim()"
      >
        <i class="pi pi-check"></i>
        Update
      </button>
    </div>
  </div>
</div>
