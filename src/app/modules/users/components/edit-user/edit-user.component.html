<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <!-- Header Section -->
    <div class="page-header">
      <div class="left-section">
        <button
          pButton
          class="p-button-text back-button"
          routerLink="/app/users"
        >
          <i class="pi pi-arrow-left"></i>
        </button>
        <h2>{{ 'USER.EDIT_TITLE' | translate }}</h2>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          [label]="'COMMON.CANCEL' | translate"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty || isCancelClicked"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          [label]="'COMMON.SAVE' | translate"
          [disabled]="userForm.invalid || !isFormDirty || saving()"
          (click)="onSubmit()"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>

    <!-- Form Section -->
    <form [formGroup]="userForm" class="admin-form">
      <div class="form-grid">
        <!-- First Name -->
        <app-custom-input
          formControlName="firstName"
          [label]="'COMMON.FIRST_NAME' | translate"
          [placeholder]="'COMMON.ENTER_FIRST_NAME' | translate"
          icon="pi-user"
          [required]="true"
          [showError]="
            !!(
              userForm.get('firstName')?.invalid &&
              userForm.get('firstName')?.touched
            )
          "
          [errorMessage]="getFirstNameError()"
        >
        </app-custom-input>

        <!-- Last Name -->
        <app-custom-input
          formControlName="lastName"
          [label]="'COMMON.LAST_NAME' | translate"
          [placeholder]="'COMMON.ENTER_LAST_NAME' | translate"
          icon="pi-user"
          [required]="true"
          [showError]="
            !!(
              userForm.get('lastName')?.invalid &&
              userForm.get('lastName')?.touched
            )
          "
          [errorMessage]="getLastNameError()"
        >
        </app-custom-input>

        <!-- Username (disabled) -->
        <app-custom-input
          formControlName="username"
          [label]="'COMMON.USERNAME' | translate"
          [placeholder]="'COMMON.ENTER_USERNAME' | translate"
          icon="pi-user-edit"
          [required]="true"
          [inputDisabled]="true"
        >
        </app-custom-input>

        <!-- Email -->
        <app-custom-input
          formControlName="email"
          [label]="'COMMON.EMAIL' | translate"
          [placeholder]="'COMMON.ENTER_EMAIL' | translate"
          icon="pi-envelope"
          type="email"
          [required]="true"
          [showError]="
            !!(userForm.get('email')?.invalid && userForm.get('email')?.touched)
          "
          [errorMessage]="
            userForm.get('email')?.errors?.['required']
              ? ('VALIDATION.EMAIL_REQUIRED' | translate)
              : userForm.get('email')?.errors?.['email']
                ? ('VALIDATION.EMAIL_INVALID' | translate)
                : ''
          "
        >
        </app-custom-input>

        <!-- Organisation (disabled) -->
        <app-custom-input
          *ngIf="showOrganisationDropdown"
          [ngModel]="selectedOrgName"
          [ngModelOptions]="{ standalone: true }"
          [label]="'COMMON.ORGANISATION' | translate"
          [placeholder]="'COMMON.ORGANISATION' | translate"
          icon="pi-building"
          [inputDisabled]="true"
        >
        </app-custom-input>

        <!-- Groups -->
        <div class="form-field">
          <label>{{ 'USER.GROUPS' | translate }} <span class="required">*</span></label>
          <app-custom-multiselect
            formControlName="groupIds"
            [options]="groups"
            optionLabel="name"
            optionValue="id"
            [placeholder]="'USER.SELECT_GROUPS' | translate"
            display="chip"
            [filter]="true"
            appendTo="body"
          ></app-custom-multiselect>
          <small
            class="error-text"
            *ngIf="
              userForm.get('groupIds')?.touched &&
              userForm.get('groupIds')?.errors?.['required']
            "
          >
            {{ 'USER.GROUP_REQUIRED' | translate }}
          </small>
        </div>

        <!-- Status -->
        <div>
          <app-custom-toggle
            formControlName="status"
            [label]="'COMMON.STATUS' | translate"
            [trueValue]="1"
            [falseValue]="0"
            [trueLabel]="'COMMON.ACTIVE' | translate"
            [falseLabel]="'COMMON.INACTIVE' | translate"
          >
          </app-custom-toggle>
          <small *ngIf="isLocked" class="locked-note">
            <i class="pi pi-lock"></i>
            {{ 'COMMON.LOCKED_NOTE' | translate }}
          </small>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="confirmation-popup" *ngIf="showSaveConfirm">
  <div class="popup-content">
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-save"></i>
      </div>
      <h3>{{ 'COMMON.CONFIRM_UPDATE' | translate }}</h3>
    </div>
    <div class="standard-delete-section">
      <p class="delete-intro">{{ 'USER.CONFIRM_UPDATE_MESSAGE' | translate }}</p>
      <div class="justification-section">
        <label for="saveJustification"
          >{{ 'COMMON.JUSTIFICATION' | translate }} <span class="required">*</span></label
        >
        <textarea
          id="saveJustification"
          [(ngModel)]="saveJustification"
          [placeholder]="'COMMON.JUSTIFICATION_UPDATE_PLACEHOLDER' | translate"
          rows="3"
          maxlength="500"
        ></textarea>
        <small class="char-count">{{ saveJustification.length }}/500</small>
      </div>
    </div>
    <div class="popup-actions">
      <button class="btn-cancel" (click)="cancelSave()">
        <i class="pi pi-times"></i>
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button
        class="btn-confirm"
        (click)="proceedSave()"
        [disabled]="!saveJustification.trim()"
      >
        <i class="pi pi-check"></i>
        {{ 'COMMON.UPDATE' | translate }}
      </button>
    </div>
  </div>
</div>
