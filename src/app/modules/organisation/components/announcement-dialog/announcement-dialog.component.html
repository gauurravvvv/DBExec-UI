<p-dialog
  header=" Announce"
  [(visible)]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '520px' }"
  styleClass="announcement-dialog"
  (onHide)="onCancel()"
>
  <div class="announcement-form" [formGroup]="announcementForm">
    <app-custom-input
      label="Title"
      placeholder="Enter announcement title"
      formControlName="name"
      [required]="true"
    >
    </app-custom-input>
    <div class="description-field">
      <app-custom-textarea
        label="Description"
        placeholder="Enter announcement description..."
        formControlName="description"
        [rows]="4"
        [required]="true"
      >
      </app-custom-textarea>
      <span
        class="char-counter"
        [class.limit-reached]="descriptionLength >= maxDescriptionLength"
      >
        {{ descriptionLength }}/{{ maxDescriptionLength }}
      </span>
    </div>
    <div class="color-status-row">
      <div class="color-picker-field">
        <label>Background</label>
        <div class="color-picker-inline">
          <p-colorPicker
            formControlName="bgColor"
            appendTo="body"
          ></p-colorPicker>
          <span class="color-value">{{
            announcementForm.get('bgColor')?.value
          }}</span>
        </div>
      </div>
      <div class="color-picker-field">
        <label>Text</label>
        <div class="color-picker-inline">
          <p-colorPicker
            formControlName="textColor"
            appendTo="body"
          ></p-colorPicker>
          <span class="color-value">{{
            announcementForm.get('textColor')?.value
          }}</span>
        </div>
      </div>
      <div class="status-toggle-field">
        <label>Status</label>
        <div class="status-toggle">
          <p-inputSwitch
            [(ngModel)]="isStatusActive"
            [ngModelOptions]="{ standalone: true }"
          ></p-inputSwitch>
          <span class="status-text" [class.active]="isStatusActive">
            {{ isStatusActive ? 'Active' : 'Inactive' }}
          </span>
        </div>
      </div>
    </div>
    <div
      class="color-preview-bar"
      [style.background]="
        'linear-gradient(135deg, ' +
        announcementForm.get('bgColor')?.value +
        ' 0%, ' +
        announcementForm.get('bgColor')?.value +
        'cc 100%)'
      "
      [style.color]="announcementForm.get('textColor')?.value"
    >
      <span
        class="preview-label"
        [style.color]="announcementForm.get('textColor')?.value"
        >ANNOUNCEMENT</span
      >
      <span class="preview-divider">|</span>
      <span class="preview-text">Preview of your banner</span>
    </div>
    <div class="form-row">
      <app-custom-calendar
        label="Start Date"
        placeholder="Select start date & time"
        formControlName="startTime"
        [minDate]="startTimeMinDate"
        dateFormat="dd M yy"
        [required]="true"
      >
      </app-custom-calendar>
      <app-custom-calendar
        label="End Date"
        placeholder="Select end date & time"
        formControlName="endTime"
        [minDate]="endTimeMinDate"
        dateFormat="dd M yy"
        [required]="true"
      >
      </app-custom-calendar>
    </div>
  </div>
  <ng-template pTemplate="footer">
    <div class="dialog-footer">
      <button
        pButton
        label="Cancel"
        icon="pi pi-times"
        class="p-button-text p-button-plain"
        (click)="onCancel()"
      ></button>
      <button
        pButton
        label="Announce"
        icon="pi pi-check"
        class="p-button-primary"
        (click)="onSave()"
        [disabled]="!isFormValid"
      ></button>
    </div>
  </ng-template>
</p-dialog>
