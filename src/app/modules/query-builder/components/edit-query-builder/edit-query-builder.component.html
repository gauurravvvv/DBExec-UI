<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <!-- Header Section -->
    <div class="page-header">
      <div class="left-section">
        <button
          pButton
          class="p-button-text p-button-plain back-button"
          routerLink="/app/query-builder"
        >
          <i class="pi pi-arrow-left text-xl"></i>
        </button>
        <h2>{{ 'QUERY_BUILDER_MODULE.EDIT_TITLE' | translate }}</h2>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          [label]="'COMMON.CANCEL' | translate"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          [label]="'COMMON.SAVE' | translate"
          (click)="onSubmit()"
          [disabled]="queryBuilderForm.invalid || !isFormDirty || saving()"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>

    <!-- Form Section -->
    <form [formGroup]="queryBuilderForm" class="admin-form">
      <div class="form-grid">
        <!-- Organisation field (disabled) -->

        <!-- Name Field -->
        <div class="form-field">
          <app-custom-input
            formControlName="name"
            [label]="'COMMON.NAME' | translate"
            [placeholder]="'COMMON.ENTER_NAME' | translate"
            icon="pi-box"
            [required]="true"
            [showError]="
              !!(
                queryBuilderForm.get('name')?.invalid &&
                queryBuilderForm.get('name')?.touched
              )
            "
            [errorMessage]="getNameError()"
          >
          </app-custom-input>
        </div>

        <!-- Description Field -->
        <div class="form-field">
          <app-custom-input
            formControlName="description"
            [label]="'COMMON.DESCRIPTION' | translate"
            [placeholder]="'COMMON.ENTER_DESCRIPTION' | translate"
            icon="pi-align-left"
          >
          </app-custom-input>
        </div>

        <app-custom-input
          *ngIf="showOrganisationDropdown"
          [ngModel]="selectedOrgName"
          [ngModelOptions]="{ standalone: true }"
          [label]="'COMMON.ORGANISATION' | translate"
          [placeholder]="'COMMON.ORGANISATION' | translate"
          icon="pi-building"
          [inputDisabled]="true"
        >
        </app-custom-input>

        <!-- Datasource field (disabled) -->
        <app-custom-input
          [ngModel]="selectedDatasourceName"
          [ngModelOptions]="{ standalone: true }"
          [label]="'COMMON.DATASOURCE' | translate"
          [placeholder]="'COMMON.DATASOURCE' | translate"
          icon="pi-database"
          [inputDisabled]="true"
        >
        </app-custom-input>

        <!-- Status -->
        <app-custom-toggle
          formControlName="status"
          [label]="'COMMON.STATUS' | translate"
          [trueValue]="1"
          [falseValue]="0"
          [trueLabel]="'COMMON.ACTIVE' | translate"
          [falseLabel]="'COMMON.INACTIVE' | translate"
        >
        </app-custom-toggle>
      </div>
    </form>
  </div>
</div>

<div class="confirmation-popup" *ngIf="showSaveConfirm">
  <div class="popup-content">
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-save"></i>
      </div>
      <h3>{{ 'COMMON.CONFIRM_UPDATE' | translate }}</h3>
    </div>

    <div class="standard-delete-section">
      <p class="delete-intro">
        {{ 'QUERY_BUILDER_MODULE.UPDATE_CONFIRM' | translate }}
      </p>

      <div class="justification-section">
        <label for="saveJustification"
          >{{ 'COMMON.JUSTIFICATION' | translate }} <span class="required">*</span></label
        >
        <textarea
          id="saveJustification"
          [(ngModel)]="saveJustification"
          [placeholder]="'COMMON.JUSTIFICATION_UPDATE_PLACEHOLDER' | translate"
          rows="3"
          maxlength="500"
        ></textarea>
        <small class="char-count">{{ saveJustification.length }}/500</small>
      </div>
    </div>

    <div class="popup-actions">
      <button class="btn-cancel" (click)="cancelSave()">
        <i class="pi pi-times"></i>
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button
        class="btn-confirm"
        (click)="proceedSave()"
        [disabled]="!saveJustification.trim()"
      >
        <i class="pi pi-check"></i>
        {{ 'COMMON.UPDATE' | translate }}
      </button>
    </div>
  </div>
</div>
