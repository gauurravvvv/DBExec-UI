<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <!-- Header Section -->
    <div class="page-header">
      <div class="left-section">
        <button
          pButton
          class="p-button-text p-button-plain back-button"
          routerLink="/app/query-builder"
        >
          <i class="pi pi-arrow-left text-xl"></i>
        </button>
        <h2>Edit Query Builder</h2>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          label="Cancel"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          label="Save"
          (click)="onSubmit()"
          [disabled]="queryBuilderForm.invalid || !isFormDirty || saving()"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>

    <!-- Form Section -->
    <form [formGroup]="queryBuilderForm" class="admin-form">
      <div class="form-grid">
        <!-- Organisation field (disabled) -->

        <!-- Name Field -->
        <div class="form-field">
          <app-custom-input
            formControlName="name"
            label="Name"
            placeholder="Enter name"
            icon="pi-box"
            [required]="true"
            [showError]="
              !!(
                queryBuilderForm.get('name')?.invalid &&
                queryBuilderForm.get('name')?.touched
              )
            "
            [errorMessage]="getNameError()"
          >
          </app-custom-input>
        </div>

        <!-- Description Field -->
        <div class="form-field">
          <app-custom-input
            formControlName="description"
            label="Description"
            placeholder="Enter description"
            icon="pi-align-left"
          >
          </app-custom-input>
        </div>

        <app-custom-input
          *ngIf="showOrganisationDropdown"
          [ngModel]="selectedOrgName"
          [ngModelOptions]="{ standalone: true }"
          label="Organisation"
          placeholder="Organisation"
          icon="pi-building"
          [inputDisabled]="true"
        >
        </app-custom-input>

        <!-- Datasource field (disabled) -->
        <app-custom-input
          [ngModel]="selectedDatasourceName"
          [ngModelOptions]="{ standalone: true }"
          label="Datasource"
          placeholder="Datasource"
          icon="pi-database"
          [inputDisabled]="true"
        >
        </app-custom-input>

        <!-- Status -->
        <app-custom-toggle
          formControlName="status"
          label="Status"
          [trueValue]="1"
          [falseValue]="0"
          trueLabel="Active"
          falseLabel="Inactive"
        >
        </app-custom-toggle>
      </div>
    </form>
  </div>
</div>

<div class="confirmation-popup" *ngIf="showSaveConfirm">
  <div class="popup-content">
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-save"></i>
      </div>
      <h3>Confirm Update</h3>
    </div>

    <div class="standard-delete-section">
      <p class="delete-intro">
        Are you sure you want to update this query builder?
      </p>

      <div class="justification-section">
        <label for="saveJustification"
          >Justification <span class="required">*</span></label
        >
        <textarea
          id="saveJustification"
          [(ngModel)]="saveJustification"
          placeholder="Provide a reason for this update"
          rows="3"
          maxlength="500"
        ></textarea>
        <small class="char-count">{{ saveJustification.length }}/500</small>
      </div>
    </div>

    <div class="popup-actions">
      <button class="btn-cancel" (click)="cancelSave()">
        <i class="pi pi-times"></i>
        Cancel
      </button>
      <button
        class="btn-confirm"
        (click)="proceedSave()"
        [disabled]="!saveJustification.trim()"
      >
        <i class="pi pi-check"></i>
        Update
      </button>
    </div>
  </div>
</div>
