<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <!-- Header Section -->
    <div class="page-header">
      <div class="left-section">
        <button pButton class="p-button-text" routerLink="/app/role">
          <i class="pi pi-arrow-left"></i>
        </button>
        <h2>{{ 'ROLE.EDIT_TITLE' | translate }}</h2>
        <span *ngIf="isDefault" class="default-badge">{{ 'ROLE.DEFAULT' | translate }}</span>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          [label]="'COMMON.CANCEL' | translate"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          [label]="'COMMON.SAVE' | translate"
          (click)="onSubmit()"
          [disabled]="roleForm.invalid || !isFormDirty || saving()"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>

    <!-- Form Section -->
    <form [formGroup]="roleForm" class="admin-form">
      <div class="basic-info-section">
        <!-- Role Name -->
        <app-custom-input
          formControlName="name"
          [label]="'COMMON.NAME' | translate"
          [placeholder]="'ROLE.ENTER_NAME' | translate"
          icon="pi-box"
          [required]="true"
          [inputDisabled]="isDefault"
          [showError]="
            !!(roleForm.get('name')?.invalid && roleForm.get('name')?.touched)
          "
          [errorMessage]="getNameError()"
        >
        </app-custom-input>

        <!-- Description -->
        <app-custom-input
          formControlName="description"
          [label]="'ROLE.DESCRIPTION' | translate"
          [placeholder]="'ROLE.ENTER_DESCRIPTION' | translate"
          icon="pi-align-left"
          [inputDisabled]="isDefault"
        >
        </app-custom-input>

        <!-- Status -->
        <div *ngIf="!isDefault">
          <app-custom-toggle
            formControlName="status"
            [label]="'COMMON.STATUS' | translate"
            [trueValue]="1"
            [falseValue]="0"
            [trueLabel]="'COMMON.ACTIVE' | translate"
            [falseLabel]="'COMMON.INACTIVE' | translate"
          >
          </app-custom-toggle>
        </div>
      </div>

      <!-- Permissions Section -->
      <div class="permissions-section" *ngIf="permissions.length > 0">
        <label class="section-title"
          >{{ 'ROLE.SCREEN_PERMISSIONS' | translate }}<span class="required"> *</span></label
        >

        <div class="permissions-grid">
          <div class="permission-columns">
            <div
              class="column"
              *ngFor="let permission of permissions; trackBy: trackByIndex"
            >
              <div class="column-header">{{ permission.label }}</div>
              <div class="permission-items">
                <div class="permission-item" *ngIf="!permission.subPermissions">
                  <span class="item-label">{{ permission.label }}</span>
                  <app-custom-toggle
                    [formControl]="getPermissionControl(permission.value)"
                    (onChange)="onPermissionChange(permission, $event)"
                    [showStatusLabel]="false"
                    [disabled]="permission.value === 'home' || isDefault"
                  ></app-custom-toggle>
                </div>

                <ng-container *ngIf="permission.subPermissions">
                  <div
                    class="permission-item"
                    *ngFor="
                      let subPerm of permission.subPermissions;
                      trackBy: trackByIndex
                    "
                  >
                    <span class="item-label">{{ subPerm.label }}</span>
                    <app-custom-toggle
                      [formControl]="getPermissionControl(subPerm.value)"
                      (onChange)="onPermissionChange(subPerm, $event)"
                      [showStatusLabel]="false"
                      [disabled]="isDefault"
                    ></app-custom-toggle>
                  </div>
                </ng-container>
              </div>
            </div>
          </div>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="confirmation-popup" *ngIf="showSaveConfirm">
  <div class="popup-content">
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-save"></i>
      </div>
      <h3>{{ 'COMMON.CONFIRM_UPDATE' | translate }}</h3>
    </div>
    <div class="standard-delete-section">
      <p class="delete-intro">{{ 'ROLE.UPDATE_CONFIRM' | translate }}</p>
      <div class="justification-section">
        <label for="saveJustification"
          >{{ 'COMMON.JUSTIFICATION' | translate }} <span class="required">*</span></label
        >
        <textarea
          id="saveJustification"
          [(ngModel)]="saveJustification"
          [placeholder]="'COMMON.JUSTIFICATION_UPDATE_PLACEHOLDER' | translate"
          rows="3"
          maxlength="500"
        ></textarea>
        <small class="char-count">{{ saveJustification.length }}/500</small>
      </div>
    </div>
    <div class="popup-actions">
      <button class="btn-cancel" (click)="cancelSave()">
        <i class="pi pi-times"></i>
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button
        class="btn-confirm"
        (click)="proceedSave()"
        [disabled]="!saveJustification.trim() || saving()"
      >
        <i class="pi pi-check"></i>
        {{ 'COMMON.UPDATE' | translate }}
      </button>
    </div>
  </div>
</div>
