<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <!-- Header Section -->
    <div class="page-header">
      <div class="left-section">
        <button pButton class="p-button-text" routerLink="/app/roles">
          <i class="pi pi-arrow-left"></i>
        </button>
        <h2>{{ 'ROLE.EDIT_TITLE' | translate }}</h2>
        <span *ngIf="isDefault" class="default-badge">{{
          'ROLE.DEFAULT' | translate
        }}</span>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          [label]="'COMMON.CANCEL' | translate"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          [label]="'COMMON.SAVE' | translate"
          (click)="onSubmit()"
          [disabled]="!canSave"
        >
          <i
            class="pi mr-2"
            [ngClass]="saving() ? 'pi-spin pi-spinner' : 'pi-save'"
          ></i>
        </button>
      </div>
    </div>

    <!-- Centered loader while role + permissions + access levels load -->
    <app-content-loader *ngIf="loadingMeta && !roleData"></app-content-loader>

    <!-- Form Section -->
    <form *ngIf="roleData" [formGroup]="roleForm" class="admin-form">
      <div class="basic-info-section">
        <!-- Role Name (always locked — BE doesn't support rename) -->
        <app-custom-input
          formControlName="name"
          [label]="'COMMON.NAME' | translate"
          [placeholder]="'ROLE.ENTER_NAME' | translate"
          icon="pi-id-card"
          [required]="true"
          [inputDisabled]="true"
          [showError]="
            !!(roleForm.get('name')?.invalid && roleForm.get('name')?.touched)
          "
          [errorMessage]="getNameError()"
          [hint]="'ROLE.NAME_IMMUTABLE' | translate"
        >
        </app-custom-input>

        <!-- Description -->
        <app-custom-input
          formControlName="description"
          [label]="'ROLE.DESCRIPTION' | translate"
          [placeholder]="'ROLE.ENTER_DESCRIPTION' | translate"
          icon="pi-align-left"
          [inputDisabled]="isDefault"
        >
        </app-custom-input>

        <!-- Status -->
        <div *ngIf="!isDefault">
          <app-custom-toggle
            formControlName="status"
            [label]="'COMMON.STATUS' | translate"
            [trueValue]="1"
            [falseValue]="0"
            [trueLabel]="'ROLE.STATUS_ACTIVE' | translate"
            [falseLabel]="'ROLE.STATUS_INACTIVE' | translate"
          >
          </app-custom-toggle>
        </div>
      </div>

      <!-- Loader while the metadata feeds are in flight (after the
           role record has landed but before the grid can render). -->
      <div class="permissions-section" *ngIf="loadingMeta">
        <label class="section-title">{{
          'PERMISSIONS.TITLE' | translate
        }}</label>
        <app-content-loader minHeight="240px"></app-content-loader>
      </div>

      <!-- Permission grid -->
      <div
        class="permissions-section"
        *ngIf="!loadingMeta && modules.length > 0"
      >
        <label class="section-title"
          >{{ 'PERMISSIONS.TITLE' | translate
          }}<span class="required"> *</span></label
        >

        <p class="grid-help" *ngIf="!hasAnyGrant">
          {{ 'ROLE.GRANT_AT_LEAST_ONE' | translate }}
        </p>

        <div
          class="permission-grid"
          role="grid"
          [style.--level-count]="accessLevels.length"
        >
          <div class="grid-cell grid-header-cell grid-cell--label" role="columnheader"></div>
          <div
            class="grid-cell grid-header-cell grid-cell--level"
            role="columnheader"
            *ngFor="let level of accessLevels; trackBy: trackByLevelValue"
          >
            {{ level.label }}
          </div>

          <ng-container
            *ngFor="let module of modules; trackBy: trackByModuleId"
          >
            <div class="grid-cell grid-module-cell" role="rowheader">
              <i *ngIf="module.icon" class="pi" [ngClass]="module.icon"></i>
              {{ module.name }}
            </div>

            <ng-container
              *ngFor="let leaf of module.submodules; trackBy: trackByLeafId"
            >
              <div class="grid-cell grid-cell--label" role="rowheader">
                {{ leaf.name }}
              </div>
              <div
                class="grid-cell grid-cell--level"
                role="gridcell"
                *ngFor="let level of accessLevels; trackBy: trackByLevelValue"
              >
                <label class="level-radio">
                  <input
                    type="radio"
                    [name]="'level-' + leaf.id"
                    [value]="level.value"
                    [checked]="isLevelSelected(leaf.id, level.value)"
                    [disabled]="isDefault"
                    (change)="onLevelChange(leaf.id, level.value)"
                  />
                  <span class="level-radio-dot" aria-hidden="true"></span>
                  <span class="visually-hidden">{{ level.label }}</span>
                </label>
              </div>
            </ng-container>
          </ng-container>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="confirmation-popup" *ngIf="showSaveConfirm">
  <div class="popup-content">
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-save"></i>
      </div>
      <h3>{{ 'COMMON.CONFIRM_UPDATE' | translate }}</h3>
    </div>
    <div class="standard-delete-section">
      <p class="delete-intro">{{ 'ROLE.UPDATE_CONFIRM' | translate }}</p>
      <div class="justification-section">
        <label for="saveJustification"
          >{{ 'COMMON.JUSTIFICATION' | translate }}
          <span class="required">*</span></label
        >
        <textarea
          id="saveJustification"
          [(ngModel)]="saveJustification"
          [placeholder]="'COMMON.JUSTIFICATION_UPDATE_PLACEHOLDER' | translate"
          rows="3"
          maxlength="500"
        ></textarea>
        <small class="char-count">{{ saveJustification.length }}/500</small>
      </div>
    </div>
    <div class="popup-actions">
      <button class="btn-cancel" (click)="cancelSave()">
        <i class="pi pi-times"></i>
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button
        class="btn-confirm"
        (click)="proceedSave()"
        [disabled]="!saveJustification.trim() || saving()"
      >
        <i
          class="pi"
          [ngClass]="saving() ? 'pi-spin pi-spinner' : 'pi-check'"
        ></i>
        {{ 'COMMON.UPDATE' | translate }}
      </button>
    </div>
  </div>
</div>
