<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <!-- Header Section -->
    <div class="page-header">
      <div class="left-section">
        <button
          pButton
          class="p-button-text back-button"
          routerLink="/app/group"
        >
          <i class="pi pi-arrow-left"></i>
        </button>
        <h2>{{ 'GROUP.EDIT_TITLE' | translate }}</h2>
        <span *ngIf="isDefaultGroup" class="default-badge">{{
          'GROUP.DEFAULT' | translate
        }}</span>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          [label]="'COMMON.CANCEL' | translate"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          [label]="'COMMON.SAVE' | translate"
          (click)="onSubmit()"
          [disabled]="!canSubmit() || saving() || !groupLoaded"
        >
          <i
            class="pi mr-2"
            [ngClass]="saving() ? 'pi-spin pi-spinner' : 'pi-save'"
          ></i>
        </button>
      </div>
    </div>

    <!-- Centered branded loader while the GET is in flight. Page
         chrome stays clickable (back, cancel) — save is disabled
         until loaded. -->
    <app-content-loader *ngIf="loading() && !groupLoaded"></app-content-loader>

    <!-- Form Section -->
    <form
      [formGroup]="groupForm"
      class="admin-form"
      *ngIf="groupForm && groupLoaded"
    >
      <div class="form-grid">
        <!-- Hidden ID Field -->
        <input type="hidden" formControlName="id" />

        <!-- Name Field -->
        <app-custom-input
          formControlName="name"
          [label]="'COMMON.NAME' | translate"
          [placeholder]="'COMMON.ENTER_NAME' | translate"
          icon="pi-id-card"
          [required]="true"
          [inputDisabled]="isDefaultGroup"
          [showError]="
            !!(groupForm.get('name')?.invalid && groupForm.get('name')?.touched)
          "
          [errorMessage]="getNameError()"
        >
        </app-custom-input>

        <!-- Description Field -->
        <app-custom-input
          formControlName="description"
          [label]="'COMMON.DESCRIPTION' | translate"
          [placeholder]="'COMMON.ENTER_DESCRIPTION' | translate"
          icon="pi-align-left"
          [inputDisabled]="isDefaultGroup"
        >
        </app-custom-input>

        <!-- Role (disabled) -->
        <app-custom-input
          [ngModel]="selectedRoleName"
          [ngModelOptions]="{ standalone: true }"
          [label]="'COMMON.ROLE' | translate"
          [placeholder]="'COMMON.ROLE' | translate"
          icon="pi-id-card"
          [inputDisabled]="true"
        >
        </app-custom-input>

        <!-- Users Multiselect (all removable on edit) -->
        <app-custom-multiselect
          formControlName="users"
          [label]="'GROUP.USERS' | translate"
          [placeholder]="'GROUP.SELECT_USERS' | translate"
          [serverMode]="true"
          [fetcher]="loadUsersPage"
          [resolveSelected]="resolveSelectedUser"
          [pageSize]="10"
          [preloadedItems]="preloadedUsers"
          [preloadedTotal]="preloadedUsersTotal"
          optionLabel="username"
          optionValue="id"
          [filter]="true"
          filterBy="username"
          display="chip"
          icon="pi-users"
        >
        </app-custom-multiselect>

        <!-- Status (hidden for default groups) -->
        <div *ngIf="!isDefaultGroup">
          <app-custom-toggle
            formControlName="status"
            [label]="'COMMON.STATUS' | translate"
            [trueValue]="1"
            [falseValue]="0"
            [trueLabel]="'COMMON.ACTIVE' | translate"
            [falseLabel]="'COMMON.INACTIVE' | translate"
          >
          </app-custom-toggle>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="confirmation-popup" *ngIf="showSaveConfirm">
  <div class="popup-content">
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-save"></i>
      </div>
      <h3>{{ 'COMMON.CONFIRM_UPDATE' | translate }}</h3>
    </div>

    <div class="standard-delete-section">
      <p class="delete-intro">
        {{ 'GROUP.CONFIRM_UPDATE_MESSAGE' | translate }}
      </p>

      <div class="justification-section">
        <app-custom-input
          [(ngModel)]="saveJustification"
          [label]="'COMMON.JUSTIFICATION' | translate"
          [placeholder]="'COMMON.JUSTIFICATION_UPDATE_PLACEHOLDER' | translate"
          inputMode="textarea"
          [rows]="3"
          [maxLength]="500"
          [required]="true"
          icon="pi-info-circle"
        ></app-custom-input>
        <small class="char-count">{{ saveJustification.length }}/500</small>
      </div>
    </div>

    <div class="popup-actions">
      <button class="btn-cancel" (click)="cancelSave()">
        <i class="pi pi-times"></i>
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button
        class="btn-confirm"
        (click)="proceedSave()"
        [disabled]="!saveJustification.trim() || saving()"
      >
        <i
          class="pi"
          [ngClass]="saving() ? 'pi-spin pi-spinner' : 'pi-check'"
        ></i>
        {{ 'COMMON.UPDATE' | translate }}
      </button>
    </div>
  </div>
</div>
