<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <!-- Header Section -->
    <div class="page-header">
      <div class="left-section">
        <button
          pButton
          class="p-button-text back-button"
          routerLink="/app/group"
        >
          <i class="pi pi-arrow-left"></i>
        </button>
        <h2>Edit Group</h2>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          label="Cancel"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          label="Save"
          (click)="onSubmit()"
          [disabled]="
            groupForm.invalid ||
            !isFormDirty ||
            groupForm.get('users')?.value?.length <= 1
          "
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>

    <!-- Form Section -->
    <form [formGroup]="groupForm" class="admin-form" *ngIf="groupForm">
      <div class="form-grid">
        <!-- Hidden ID Field -->
        <input type="hidden" formControlName="id" />

        <!-- Name Field -->
        <app-custom-input
          formControlName="name"
          label="Name"
          placeholder="Enter name"
          icon="pi-key"
          [required]="true"
          [showError]="
            !!(groupForm.get('name')?.invalid && groupForm.get('name')?.touched)
          "
          [errorMessage]="getNameError()"
        >
        </app-custom-input>

        <!-- Description Field -->
        <app-custom-input
          formControlName="description"
          label="Description"
          placeholder="Enter description"
          icon="pi-align-left"
        >
        </app-custom-input>

        <!-- Organisation (disabled) -->
        <app-custom-input
          [ngModel]="selectedOrgName"
          [ngModelOptions]="{ standalone: true }"
          label="Organisation"
          placeholder="Organisation"
          icon="pi-building"
          [inputDisabled]="true"
        >
        </app-custom-input>
        <input type="hidden" formControlName="organisation" />

        <!-- Users Multiselect -->
        <app-custom-multiselect
          formControlName="users"
          label="Users"
          placeholder="Select Users"
          [options]="users"
          optionLabel="username"
          optionValue="id"
          [filter]="true"
          filterBy="username"
          display="chip"
          [required]="true"
          [showError]="
            !!(
              groupForm.get('users')?.invalid && groupForm.get('users')?.touched
            )
          "
          errorMessage="At least two users are required"
        >
        </app-custom-multiselect>

        <!-- Status -->
        <app-custom-toggle
          formControlName="status"
          label="Status"
          [trueValue]="1"
          [falseValue]="0"
          trueLabel="Active"
          falseLabel="Inactive"
        >
        </app-custom-toggle>
      </div>
    </form>
  </div>
</div>

<div class="confirmation-popup" *ngIf="showSaveConfirm">
  <div class="popup-content">
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-save"></i>
      </div>
      <h3>Confirm Update</h3>
    </div>

    <div class="standard-delete-section">
      <p class="delete-intro">Are you sure you want to update this group?</p>

      <div class="justification-section">
        <app-custom-input
          [(ngModel)]="saveJustification"
          label="Justification"
          placeholder="Provide a reason for this update"
          inputMode="textarea"
          [rows]="3"
          [maxLength]="500"
          [required]="true"
        ></app-custom-input>
        <small class="char-count">{{ saveJustification.length }}/500</small>
      </div>
    </div>

    <div class="popup-actions">
      <button class="btn-cancel" (click)="cancelSave()">
        <i class="pi pi-times"></i>
        Cancel
      </button>
      <button
        class="btn-confirm"
        (click)="proceedSave()"
        [disabled]="!saveJustification.trim()"
      >
        <i class="pi pi-check"></i>
        Update
      </button>
    </div>
  </div>
</div>
