<app-auth-shell
  cardTitle="Reset password"
  cardSubtitle="Enter the code we emailed and choose a new password."
>
  <form
    id="auth-form"
    [formGroup]="resetPasswordForm"
    (ngSubmit)="onSubmit()"
    class="auth-form"
    novalidate
  >
    <div class="auth-form__field">
      <label class="auth-otp-label" for="rp-otp-0">Verification code</label>
      <div class="auth-otp" id="rp-otp-0" (paste)="onOtpPaste($event)">
        <input
          *ngFor="let ctrl of otpControls; let i = index; trackBy: trackByIndex"
          #otpInput
          type="text"
          maxlength="1"
          class="auth-otp__box"
          [formControl]="ctrl"
          (input)="onOtpInput($event, i)"
          (keydown)="onOtpKeydown($event, i)"
          [class.is-invalid]="otpInvalid && ctrl.invalid"
          autocomplete="one-time-code"
          inputmode="text"
          [attr.aria-label]="'Verification code character ' + (i + 1)"
        />
      </div>
      <small class="error-message" *ngIf="otpInvalid && !isOtpComplete">
        Please enter the 6-character verification code
      </small>
    </div>

    <div
      class="auth-form__field"
      (focusin)="onPasswordFocus()"
      (focusout)="onPasswordBlur()"
    >
      <label class="auth-visually-hidden" for="rp-password">New password</label>
      <app-custom-input
        inputId="rp-password"
        formControlName="newPassword"
        placeholder="New password"
        icon="pi-lock"
        autocomplete="new-password"
        ariaLabel="New password"
        [showPasswordToggle]="true"
        [showError]="
          !!(
            resetPasswordForm.get('newPassword')?.invalid &&
            resetPasswordForm.get('newPassword')?.touched
          )
        "
        [errorMessage]="getPasswordError()"
      ></app-custom-input>
      <p
        class="auth-form__capslock"
        *ngIf="capsLockOn() && passwordFocused()"
        role="status"
        aria-live="polite"
      >
        <i class="pi pi-info-circle" aria-hidden="true"></i>
        Caps Lock is on
      </p>
    </div>

    <div class="auth-form__field">
      <label class="auth-visually-hidden" for="rp-confirm">Confirm password</label>
      <app-custom-input
        inputId="rp-confirm"
        formControlName="confirmPassword"
        placeholder="Confirm password"
        icon="pi-lock"
        autocomplete="new-password"
        ariaLabel="Confirm password"
        [showPasswordToggle]="true"
        [showError]="
          !!(
            resetPasswordForm.get('confirmPassword')?.invalid &&
            resetPasswordForm.get('confirmPassword')?.touched
          )
        "
        errorMessage="Please confirm your password"
      ></app-custom-input>
      <small
        class="error-message"
        *ngIf="
          resetPasswordForm.errors?.['mismatch'] &&
          resetPasswordForm.get('confirmPassword')?.touched
        "
      >
        Passwords do not match
      </small>
    </div>

    <div
      class="auth-form__error"
      role="alert"
      aria-live="polite"
      [class.is-empty]="!error()"
    >
      <ng-container *ngIf="error()">
        <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
        <span>{{ error() }}</span>
      </ng-container>
    </div>

    <button
      pButton
      type="submit"
      class="auth-form__submit"
      [label]="loading() ? 'Resetting…' : 'Reset password'"
      [disabled]="!isFormValid || loading()"
      [loading]="loading()"
    ></button>

    <div class="auth-form__footer-row">
      <a class="auth-form__link" [routerLink]="['/login']">Back to sign in</a>
    </div>
  </form>
</app-auth-shell>
