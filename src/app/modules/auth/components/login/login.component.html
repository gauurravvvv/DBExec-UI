<app-auth-shell
  cardTitle="Welcome back"
  cardSubtitle="Continue to DBExec"
>
  <form
    id="auth-form"
    [formGroup]="loginForm"
    (ngSubmit)="onSubmit()"
    class="auth-form"
    novalidate
  >
    <div class="auth-form__field">
      <label class="auth-visually-hidden" for="auth-account">Account</label>
      <app-custom-input
        inputId="auth-account"
        formControlName="organisation"
        placeholder="Account"
        icon="pi-desktop"
        autocomplete="organization"
        ariaLabel="Account"
        [showError]="
          !!(
            loginForm.get('organisation')?.invalid &&
            (loginForm.get('organisation')?.touched || submitAttempted())
          )
        "
        [errorMessage]="getErrorMessage('organisation')"
      ></app-custom-input>
    </div>

    <div class="auth-form__field">
      <label class="auth-visually-hidden" for="auth-username">Username</label>
      <app-custom-input
        inputId="auth-username"
        formControlName="username"
        placeholder="Username"
        icon="pi-user"
        autocomplete="username"
        ariaLabel="Username"
        [showError]="
          !!(
            loginForm.get('username')?.invalid &&
            (loginForm.get('username')?.touched || submitAttempted())
          )
        "
        [errorMessage]="getErrorMessage('username')"
      ></app-custom-input>
    </div>

    <div
      class="auth-form__field"
      (focusin)="onPasswordFocus()"
      (focusout)="onPasswordBlur()"
    >
      <label class="auth-visually-hidden" for="auth-password">Password</label>
      <app-custom-input
        inputId="auth-password"
        formControlName="password"
        placeholder="Password"
        icon="pi-lock"
        autocomplete="current-password"
        ariaLabel="Password"
        [showPasswordToggle]="true"
        [showError]="
          !!(
            loginForm.get('password')?.invalid &&
            (loginForm.get('password')?.touched || submitAttempted())
          )
        "
        [errorMessage]="getErrorMessage('password')"
      ></app-custom-input>
      <p
        class="auth-form__capslock"
        *ngIf="capsLockOn() && passwordFocused()"
        role="status"
        aria-live="polite"
      >
        <i class="pi pi-info-circle" aria-hidden="true"></i>
        Caps Lock is on
      </p>
    </div>

    <div
      class="auth-form__error"
      role="alert"
      aria-live="polite"
      [class.is-empty]="!loginError()"
    >
      <ng-container *ngIf="loginError()">
        <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
        <span>{{ loginError() }}</span>
      </ng-container>
    </div>

    <button
      pButton
      type="submit"
      class="auth-form__submit"
      [label]="loading() ? 'Signing in…' : 'Sign in'"
      [disabled]="loginForm.invalid || loading()"
      [loading]="loading()"
    ></button>

    <div class="auth-form__footer-row">
      <a class="auth-form__link" [routerLink]="['/forgot-password']">
        Forgot password?
      </a>
      <span class="auth-form__hint">We'll email a reset link</span>
    </div>
  </form>
</app-auth-shell>
