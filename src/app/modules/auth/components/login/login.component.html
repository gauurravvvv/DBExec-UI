<div class="login-container">
  <!-- Left Section - Marketing Content -->
  <div class="marketing-section">
    <!-- Add floating icons container -->
    <div class="floating-icons">
      <i class="ci ci-database floating-icon"></i>
      <i class="ci ci-code floating-icon"></i>
      <i class="ci ci-function floating-icon"></i>
      <i class="ci ci-table-cells floating-icon"></i>
      <i class="ci ci-globe floating-icon"></i>
      <i class="ci ci-dataset floating-icon"></i>
      <i class="ci ci-columns floating-icon"></i>
      <i class="ci ci-dataset-binder floating-icon"></i>
      <i class="ci ci-list-ol floating-icon"></i>
      <i class="ci ci-sort-numeric floating-icon"></i>
      <i class="ci ci-site-map floating-icon"></i>
      <i class="ci ci-studio floating-icon"></i>
    </div>

    <div class="brand mb-5">
      <i class="ci ci-app-icon mr-2"></i>
      <span>DBExec</span>
    </div>
    <h1 class="headline">Elevate Your Datasource<br />Management Experience</h1>
    <p class="subtitle">Powerful . Intuitive . Secure</p>
    <div class="features-grid">
      <div class="feature-item" *ngFor="let feature of features; trackBy: trackByIndex">
        <div class="feature-icon">
          <i class="pi pi-{{ feature.icon }}"></i>
        </div>
        <div class="feature-content">
          <h3>{{ feature.title }}</h3>
          <p>{{ feature.description }}</p>
        </div>
      </div>
    </div>

    <div class="security-badge">
      <i class="pi pi-shield"></i>
      Enterprise-Grade Security
    </div>
  </div>
  <!-- Right Section - Login Form -->
  <div class="login-section">
    <div class="login-box">
      <h2>Welcome</h2>
      <p class="text-500 mb-4">Sign in to continue to DBExec</p>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="p-fluid">
        <div class="field mb-4">
          <app-custom-input
            formControlName="organisation"
            placeholder="Organisation"
            icon="pi-building"
            styleClass="p-inputtext-lg"
            [showError]="
              !!(
                loginForm.get('organisation')?.invalid &&
                loginForm.get('organisation')?.touched
              )
            "
            [errorMessage]="getErrorMessage('organisation')"
          >
          </app-custom-input>
        </div>

        <div class="field mb-4">
          <app-custom-input
            formControlName="username"
            placeholder="Username"
            icon="pi-user"
            styleClass="p-inputtext-lg"
            [showError]="
              !!(
                loginForm.get('username')?.invalid &&
                loginForm.get('username')?.touched
              )
            "
            [errorMessage]="getErrorMessage('username')"
          >
          </app-custom-input>
        </div>

        <div class="field mb-4">
          <app-custom-input
            formControlName="password"
            placeholder="Password"
            icon="pi-lock"
            styleClass="p-inputtext-lg"
            [showPasswordToggle]="true"
            [showError]="
              !!(
                loginForm.get('password')?.invalid &&
                loginForm.get('password')?.touched
              )
            "
            [errorMessage]="getErrorMessage('password')"
          >
          </app-custom-input>
        </div>

        <div class="flex align-items-center justify-content-end mb-4">
          <a class="forgot-password" [routerLink]="['/forgot-password']">
            Forgot password?
          </a>
        </div>

        <button
          pButton
          type="submit"
          label="Login"
          [disabled]="!loginForm.valid"
          class="p-button-lg"
        ></button>

        <div class="login-error" *ngIf="loginError">
          <i class="pi pi-exclamation-circle"></i>
          {{ loginError }}
        </div>
      </form>
    </div>
  </div>
</div>
