<app-auth-shell
  cardTitle="Reset password"
  cardSubtitle="Tell us who you are and we'll email an OTP."
>
  <form
    id="auth-form"
    [formGroup]="forgotPasswordForm"
    (ngSubmit)="onSubmit()"
    class="auth-form"
    novalidate
  >
    <div class="auth-form__field">
      <label class="auth-visually-hidden" for="fp-account">Organisation</label>
      <app-custom-input
        inputId="fp-account"
        formControlName="organisation"
        placeholder="Organisation"
        icon="pi-building"
        autocomplete="organization"
        ariaLabel="Organisation"
        [showError]="
          !!(
            forgotPasswordForm.get('organisation')?.invalid &&
            forgotPasswordForm.get('organisation')?.touched
          )
        "
        [errorMessage]="getErrorMessage('organisation')"
      ></app-custom-input>
    </div>

    <div class="auth-form__field">
      <label class="auth-visually-hidden" for="fp-username">Username</label>
      <app-custom-input
        inputId="fp-username"
        formControlName="username"
        placeholder="Username"
        icon="pi-user"
        autocomplete="username"
        ariaLabel="Username"
        [showError]="
          !!(
            forgotPasswordForm.get('username')?.invalid &&
            forgotPasswordForm.get('username')?.touched
          )
        "
        [errorMessage]="getErrorMessage('username')"
      ></app-custom-input>
    </div>

    <div class="auth-form__field">
      <label class="auth-visually-hidden" for="fp-email">Email</label>
      <app-custom-input
        inputId="fp-email"
        formControlName="email"
        placeholder="Email"
        icon="pi-envelope"
        autocomplete="email"
        ariaLabel="Email"
        [showError]="
          !!(
            forgotPasswordForm.get('email')?.invalid &&
            forgotPasswordForm.get('email')?.touched
          )
        "
        [errorMessage]="getErrorMessage('email')"
      ></app-custom-input>
    </div>

    <div
      class="auth-form__error"
      role="alert"
      aria-live="polite"
      [class.is-empty]="!error()"
    >
      <ng-container *ngIf="error()">
        <i class="pi pi-exclamation-circle" aria-hidden="true"></i>
        <span>{{ error() }}</span>
      </ng-container>
    </div>

    <button
      pButton
      type="submit"
      class="auth-form__submit"
      [label]="
        loading() ? 'Sending…' : canResend() ? 'Resend OTP' : 'Send OTP'
      "
      [disabled]="
        forgotPasswordForm.invalid ||
        (otpSent() && !canResend()) ||
        loading()
      "
      [loading]="loading()"
    ></button>

    <div class="auth-form__info" *ngIf="otpSent() && !canResend()">
      <i class="pi pi-clock" aria-hidden="true"></i>
      <span>Resend in <strong>{{ countdownDisplay() }}</strong></span>
    </div>

    <div class="auth-form__footer-row">
      <a class="auth-form__link" [routerLink]="['/login']">Back to sign in</a>
    </div>
  </form>
</app-auth-shell>
