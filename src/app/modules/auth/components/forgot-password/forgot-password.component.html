<div class="login-container">
  <!-- Left Section - Marketing Content -->
  <div class="marketing-section">
    <div class="brand mb-5">
      <i class="ci ci-app-icon mr-2"></i>
      <span>DBExec</span>
    </div>
    <h1 class="headline">Securely Reset Your<br />Account Password</h1>
    <p class="subtitle">Powerful . Intuitive . Secure</p>
    <div class="features-grid">
      <div
        class="feature-item"
        *ngFor="let feature of features; trackBy: trackByIndex"
      >
        <div class="feature-icon">
          <i class="pi pi-{{ feature.icon }}"></i>
        </div>
        <div class="feature-content">
          <h3>{{ feature.title }}</h3>
          <p>{{ feature.description }}</p>
        </div>
      </div>
    </div>

    <div class="security-badge">
      <i class="pi pi-shield"></i>
      Enterprise-Grade Security
    </div>
  </div>
  <!-- Right Section - Login Form -->
  <div class="login-section">
    <div class="login-box">
      <h2>Reset Password</h2>
      <p class="text-500 mb-4">Enter your details to reset your password</p>
      <form
        [formGroup]="forgotPasswordForm"
        (ngSubmit)="onSubmit()"
        class="p-fluid"
      >
        <div class="field mb-4">
          <app-custom-input
            formControlName="organisation"
            placeholder="Organisation"
            icon="pi-building"
            styleClass="p-inputtext-lg"
            [showError]="
              !!(
                forgotPasswordForm.get('organisation')?.invalid &&
                forgotPasswordForm.get('organisation')?.touched
              )
            "
            [errorMessage]="getErrorMessage('organisation')"
          >
          </app-custom-input>
        </div>

        <div class="field mb-4">
          <app-custom-input
            formControlName="username"
            placeholder="Username"
            icon="pi-user"
            styleClass="p-inputtext-lg"
            [showError]="
              !!(
                forgotPasswordForm.get('username')?.invalid &&
                forgotPasswordForm.get('username')?.touched
              )
            "
            [errorMessage]="getErrorMessage('username')"
          >
          </app-custom-input>
        </div>

        <div class="field mb-4">
          <app-custom-input
            formControlName="email"
            placeholder="Email"
            icon="pi-envelope"
            styleClass="p-inputtext-lg"
            [showError]="
              !!(
                forgotPasswordForm.get('email')?.invalid &&
                forgotPasswordForm.get('email')?.touched
              )
            "
            [errorMessage]="getErrorMessage('email')"
          >
          </app-custom-input>
        </div>

        <div class="flex align-items-center justify-content-end mb-4">
          <a class="forgot-password" [routerLink]="['/login']">
            Back to Login
          </a>
        </div>

        <button
          pButton
          type="submit"
          [label]="
            loading() ? 'Sending...' : canResend() ? 'Resend OTP' : 'Send OTP'
          "
          [disabled]="
            !forgotPasswordForm.valid ||
            (otpSent() && !canResend()) ||
            loading()
          "
          [loading]="loading()"
          class="p-button-lg"
        ></button>

        <div class="login-error" *ngIf="error()">
          <i class="pi pi-exclamation-circle"></i>
          {{ error() }}
        </div>

        <div class="otp-timer" *ngIf="otpSent() && !canResend()">
          <i class="pi pi-clock"></i>
          <span
            >Resend in <strong>{{ countdownDisplay() }}</strong></span
          >
        </div>
      </form>
    </div>
  </div>
</div>
