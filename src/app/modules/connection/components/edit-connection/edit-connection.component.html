<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <!-- Header Section -->
    <div class="page-header">
      <div class="left-section">
        <button
          pButton
          class="p-button-text back-button"
          routerLink="/app/connections"
        >
          <i class="pi pi-arrow-left"></i>
        </button>
        <h2>{{ 'CONNECTION.EDIT_TITLE' | translate }}</h2>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          [label]="'COMMON.CANCEL' | translate"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty || isCancelClicked"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          [label]="'COMMON.SAVE' | translate"
          (click)="onSubmit()"
          [disabled]="connectionForm.invalid || !isFormDirty"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>

    <!-- Form Section -->
    <form [formGroup]="connectionForm" class="admin-form" #formContainer>
      <div class="form-grid">
        <!-- Name Field -->
        <app-custom-input
          formControlName="name"
          [label]="'COMMON.NAME' | translate"
          [placeholder]="'CONNECTION.ENTER_NAME' | translate"
          icon="pi-box"
          [required]="true"
          [showError]="
            !!(
              connectionForm.get('name')?.invalid &&
              connectionForm.get('name')?.touched
            )
          "
          [errorMessage]="getNameError()"
        >
        </app-custom-input>

        <!-- Description Field -->
        <app-custom-input
          formControlName="description"
          [label]="'COMMON.DESCRIPTION' | translate"
          [placeholder]="'CONNECTION.ENTER_DESCRIPTION' | translate"
          icon="pi-align-left"
        >
        </app-custom-input>

        <!-- Organisation Field (disabled) -->
        <app-custom-input
          *ngIf="showOrganisationDropdown"
          [ngModel]="selectedOrgName"
          [ngModelOptions]="{ standalone: true }"
          [label]="'COMMON.ORGANISATION' | translate"
          [placeholder]="'COMMON.ORGANISATION' | translate"
          icon="pi-building"
          [inputDisabled]="true"
        >
        </app-custom-input>

        <!-- Datasource Field (disabled) -->
        <app-custom-input
          [ngModel]="selectedDatasourceName"
          [ngModelOptions]="{ standalone: true }"
          [label]="'CONNECTION.DATASOURCE' | translate"
          [placeholder]="'CONNECTION.DATASOURCE' | translate"
          icon="pi-database"
          [inputDisabled]="true"
        >
        </app-custom-input>

        <!-- Status Toggle -->
        <app-custom-toggle
          formControlName="status"
          [label]="'COMMON.STATUS' | translate"
          [trueValue]="1"
          [falseValue]="0"
          [trueLabel]="'COMMON.ACTIVE' | translate"
          [falseLabel]="'COMMON.INACTIVE' | translate"
        >
        </app-custom-toggle>

        <!-- DB Username -->
        <app-custom-input
          formControlName="dbUsername"
          [label]="'CONNECTION.DATASOURCE_USERNAME' | translate"
          [placeholder]="'CONNECTION.ENTER_DATASOURCE_USERNAME' | translate"
          icon="pi-user"
          [required]="true"
          [showError]="
            !!(
              connectionForm.get('dbUsername')?.invalid &&
              connectionForm.get('dbUsername')?.touched
            )
          "
          [errorMessage]="'VALIDATION.DATASOURCE_USERNAME_REQUIRED' | translate"
        >
        </app-custom-input>

        <!-- DB Password -->
        <app-custom-input
          formControlName="dbPassword"
          [label]="'CONNECTION.DATASOURCE_PASSWORD' | translate"
          [placeholder]="'CONNECTION.ENTER_PASSWORD' | translate"
          icon="pi-lock"
          [required]="true"
          [showPasswordToggle]="true"
          [showError]="
            !!(
              connectionForm.get('dbPassword')?.invalid &&
              connectionForm.get('dbPassword')?.touched
            )
          "
          [errorMessage]="'VALIDATION.DATASOURCE_PASSWORD_REQUIRED' | translate"
        >
        </app-custom-input>
      </div>
    </form>
  </div>
</div>

<div class="confirmation-popup" *ngIf="showSaveConfirm">
  <div class="popup-content">
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-save"></i>
      </div>
      <h3>{{ 'COMMON.CONFIRM_UPDATE' | translate }}</h3>
    </div>

    <div class="standard-delete-section">
      <p class="delete-intro">
        {{ 'CONNECTION.CONFIRM_UPDATE_MESSAGE' | translate }}
      </p>

      <div class="justification-section">
        <label for="saveJustification"
          >{{ 'COMMON.JUSTIFICATION' | translate }} <span class="required">*</span></label
        >
        <textarea
          id="saveJustification"
          [(ngModel)]="saveJustification"
          [placeholder]="'COMMON.JUSTIFICATION_UPDATE_PLACEHOLDER' | translate"
          rows="3"
          maxlength="500"
        ></textarea>
        <small class="char-count">{{ saveJustification.length }}/500</small>
      </div>
    </div>

    <div class="popup-actions">
      <button class="btn-cancel" (click)="cancelSave()">
        <i class="pi pi-times"></i>
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button
        class="btn-confirm"
        (click)="proceedSave()"
        [disabled]="!saveJustification.trim()"
      >
        <i class="pi pi-check"></i>
        {{ 'COMMON.UPDATE' | translate }}
      </button>
    </div>
  </div>
</div>
