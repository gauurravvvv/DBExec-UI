<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <!-- Header Section -->
    <div class="page-header">
      <div class="left-section">
        <button
          pButton
          class="p-button-text back-button"
          routerLink="/app/connections"
        >
          <i class="pi pi-arrow-left"></i>
        </button>
        <h2>Edit Connection</h2>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          label="Cancel"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty || isCancelClicked"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          label="Save"
          (click)="onSubmit()"
          [disabled]="connectionForm.invalid || !isFormDirty"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>

    <!-- Form Section -->
    <form [formGroup]="connectionForm" class="admin-form" #formContainer>
      <div class="form-grid">
        <!-- Name Field -->
        <app-custom-input
          formControlName="name"
          label="Name"
          placeholder="Enter name"
          icon="pi-box"
          [required]="true"
          [showError]="
            !!(
              connectionForm.get('name')?.invalid &&
              connectionForm.get('name')?.touched
            )
          "
          [errorMessage]="getNameError()"
        >
        </app-custom-input>

        <!-- Description Field -->
        <app-custom-input
          formControlName="description"
          label="Description"
          placeholder="Enter description"
          icon="pi-align-left"
        >
        </app-custom-input>

        <!-- Organisation Field (readonly) -->
        <div class="form-field" *ngIf="showOrganisationDropdown">
          <label for="organisation">Organisation</label>
          <span class="p-input-icon-left">
            <i class="pi pi-building"></i>
            <input
              id="organisation"
              type="text"
              pInputText
              [value]="selectedOrgName"
              disabled
              class="readonly"
            />
          </span>
        </div>

        <!-- Datasource Field (readonly) -->
        <div class="form-field">
          <label for="database">Datasource</label>
          <span class="p-input-icon-left">
            <i class="pi pi-database"></i>
            <input
              id="datasource"
              type="text"
              pInputText
              [value]="selectedDatasourceName"
              disabled
              class="readonly"
            />
          </span>
        </div>

        <!-- Status Toggle -->
        <app-custom-toggle
          formControlName="status"
          label="Status"
          [trueValue]="1"
          [falseValue]="0"
          trueLabel="Active"
          falseLabel="Inactive"
        >
        </app-custom-toggle>

        <!-- DB Username -->
        <app-custom-input
          formControlName="dbUsername"
          label="Datasource Username"
          placeholder="Enter Datasource Username"
          icon="pi-user"
          [required]="true"
          [showError]="
            !!(
              connectionForm.get('dbUsername')?.invalid &&
              connectionForm.get('dbUsername')?.touched
            )
          "
          errorMessage="Datasource Username is required"
        >
        </app-custom-input>

        <!-- DB Password -->
        <div class="form-field">
          <label for="password"
            >Datasource Password<span class="required"> *</span></label
          >
          <span class="p-input-icon-left p-input-icon-right">
            <i class="pi pi-lock"></i>
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              pInputText
              formControlName="dbPassword"
              placeholder="Enter password"
              [ngClass]="{
                'ng-invalid ng-dirty':
                  connectionForm.get('dbPassword')?.invalid &&
                  connectionForm.get('dbPassword')?.touched,
              }"
            />
            <i
              class="pi pi-eye"
              style="cursor: pointer"
              (click)="togglePassword($event)"
            ></i>
          </span>
          <small
            class="error-message"
            *ngIf="
              connectionForm.get('dbPassword')?.invalid &&
              connectionForm.get('dbPassword')?.touched
            "
          >
            Datasource Password is required
          </small>
        </div>
      </div>
    </form>
  </div>
</div>

<div class="confirmation-popup" *ngIf="showSaveConfirm">
  <div class="popup-content">
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-save"></i>
      </div>
      <h3>Confirm Update</h3>
    </div>

    <div class="standard-delete-section">
      <p class="delete-intro">
        Are you sure you want to update this connection?
      </p>

      <div class="justification-section">
        <label for="saveJustification"
          >Justification <span class="required">*</span></label
        >
        <textarea
          id="saveJustification"
          [(ngModel)]="saveJustification"
          placeholder="Provide a reason for this update"
          rows="3"
          maxlength="500"
        ></textarea>
        <small class="char-count">{{ saveJustification.length }}/500</small>
      </div>
    </div>

    <div class="popup-actions">
      <button class="btn-cancel" (click)="cancelSave()">
        <i class="pi pi-times"></i>
        Cancel
      </button>
      <button
        class="btn-confirm"
        (click)="proceedSave()"
        [disabled]="!saveJustification.trim()"
      >
        <i class="pi pi-check"></i>
        Update
      </button>
    </div>
  </div>
</div>
