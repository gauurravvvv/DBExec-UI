<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <div class="page-header">
      <div class="left-section">
        <button pButton class="p-button-text back-button" routerLink="/app/rls-rules">
          <i class="pi pi-arrow-left"></i>
        </button>
        <h2>Edit RLS Rule</h2>
      </div>
      <div class="action-buttons">
        <button pButton type="button" label="Cancel" class="p-button-outlined btn-cancel" [disabled]="!isFormDirty" (click)="onCancel()"></button>
        <button pButton class="p-button-primary btn-save" type="submit" label="Save" (click)="onSubmit()" [disabled]="rlsForm.invalid || !isFormDirty">
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>

    <form [formGroup]="rlsForm" class="admin-form" *ngIf="rlsForm">
      <div class="form-grid">
        <input type="hidden" formControlName="id" />

        <app-custom-input formControlName="name" label="Rule Name" placeholder="Enter rule name" [required]="true"
          [showError]="!!(rlsForm.get('name')?.invalid && rlsForm.get('name')?.touched)" [errorMessage]="getNameError()">
        </app-custom-input>

        <app-custom-input formControlName="description" label="Description" placeholder="Enter description" inputMode="textarea" [rows]="3">
        </app-custom-input>

        <!-- Organisation (read-only) -->
        <app-custom-input [ngModel]="orgId" [ngModelOptions]="{standalone: true}" label="Organisation" [inputDisabled]="true"></app-custom-input>
        <input type="hidden" formControlName="organisation" />

        <!-- Dataset (read-only) -->
        <app-custom-input [ngModel]="datasetName" [ngModelOptions]="{standalone: true}" label="Dataset" [inputDisabled]="true"></app-custom-input>
        <input type="hidden" formControlName="datasetId" />

        <app-custom-dropdown formControlName="scope" label="Scope" placeholder="Select Scope"
          [options]="scopeOptions" optionLabel="label" optionValue="value" [required]="true">
        </app-custom-dropdown>

        <app-custom-dropdown formControlName="scopeId" label="Applies To" [placeholder]="rlsForm.get('scope')?.value === 'user' ? 'Select User' : 'Select Group'"
          [options]="scopeTargets" optionLabel="label" optionValue="value" [filter]="true" [required]="true">
        </app-custom-dropdown>

        <app-custom-input formControlName="columnName" label="Column Name" placeholder="Enter column name" [required]="true"
          [showError]="!!(rlsForm.get('columnName')?.invalid && rlsForm.get('columnName')?.touched)" errorMessage="Column name is required">
        </app-custom-input>

        <app-custom-dropdown formControlName="operator" label="Operator" placeholder="Select Operator"
          [options]="operatorOptions" optionLabel="label" optionValue="value" [required]="true">
        </app-custom-dropdown>

        <app-custom-input formControlName="values" label="Values" placeholder="Enter comma-separated values" [required]="true"
          [showError]="!!(rlsForm.get('values')?.invalid && rlsForm.get('values')?.touched)" errorMessage="At least one value is required">
        </app-custom-input>

        <app-custom-toggle formControlName="isEnabled" label="Enabled" [trueValue]="true" [falseValue]="false" trueLabel="Enabled" falseLabel="Disabled">
        </app-custom-toggle>
      </div>
    </form>
  </div>
</div>

<!-- Save Confirmation -->
<div class="confirmation-popup" *ngIf="showSaveConfirm">
  <div class="popup-content">
    <div class="popup-header">
      <div class="popup-icon"><i class="pi pi-save"></i></div>
      <h3>Confirm Update</h3>
    </div>
    <div class="standard-delete-section">
      <p class="delete-intro">Are you sure you want to update this RLS rule?</p>
      <div class="justification-section">
        <app-custom-input [(ngModel)]="saveJustification" label="Justification" placeholder="Provide a reason for this update"
          inputMode="textarea" [rows]="3" [maxLength]="500" [required]="true"></app-custom-input>
        <small class="char-count">{{ saveJustification.length }}/500</small>
      </div>
    </div>
    <div class="popup-actions">
      <button class="btn-cancel" (click)="cancelSave()"><i class="pi pi-times"></i> Cancel</button>
      <button class="btn-confirm" (click)="proceedSave()" [disabled]="!saveJustification.trim()"><i class="pi pi-check"></i> Update</button>
    </div>
  </div>
</div>
