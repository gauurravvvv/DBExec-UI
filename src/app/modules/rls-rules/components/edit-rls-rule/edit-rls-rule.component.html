<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <div class="page-header">
      <div class="left-section">
        <button
          pButton
          class="p-button-text back-button"
          routerLink="/app/rls-rules"
        >
          <i class="pi pi-arrow-left"></i>
        </button>
        <h2>{{ 'RLS.EDIT_TITLE' | translate }}</h2>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          [label]="'COMMON.CANCEL' | translate"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          [label]="'COMMON.SAVE' | translate"
          (click)="onSubmit()"
          [disabled]="rlsForm.invalid || !isFormDirty"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>

    <form [formGroup]="rlsForm" class="admin-form" *ngIf="rlsForm">
      <div class="form-grid">
        <input type="hidden" formControlName="id" />

        <app-custom-input
          formControlName="name"
          [label]="'RLS.RULE_NAME' | translate"
          [placeholder]="'RLS.ENTER_RULE_NAME' | translate"
          [required]="true"
          [showError]="
            !!(rlsForm.get('name')?.invalid && rlsForm.get('name')?.touched)
          "
          [errorMessage]="getNameError()"
        >
        </app-custom-input>

        <app-custom-input
          formControlName="description"
          [label]="'COMMON.DESCRIPTION' | translate"
          [placeholder]="'COMMON.ENTER_DESCRIPTION' | translate"
        >
        </app-custom-input>

        <!-- Organisation (read-only) -->
        <app-custom-input
          [ngModel]="orgId"
          [ngModelOptions]="{ standalone: true }"
          [label]="'COMMON.ORGANISATION' | translate"
          [inputDisabled]="true"
        ></app-custom-input>
        <input type="hidden" formControlName="organisation" />

        <input type="hidden" formControlName="datasetId" />

        <!-- Filter Conditions -->
        <div class="conditions-section" formArrayName="conditions">
          <div class="conditions-header">
            <span class="conditions-label">
              {{ 'RLS.FILTER_CONDITIONS' | translate }} <span class="required">*</span>
            </span>
            <button
              type="button"
              class="btn-add-condition"
              (click)="addCondition()"
            >
              <i class="pi pi-plus"></i> {{ 'RLS.ADD_CONDITION' | translate }}
            </button>
          </div>
          <div class="conditions-hint">
            <i class="pi pi-info-circle"></i>
            {{ 'RLS.ALL_CONDITIONS_ANDED' | translate }}
          </div>
          <div
            class="condition-row"
            *ngFor="
              let cond of conditions.controls;
              let i = index;
              trackBy: trackByIndex
            "
            [formGroupName]="i"
          >
            <div class="condition-fields">
              <div class="condition-top-row">
                <app-custom-dropdown
                  formControlName="columnName"
                  [options]="datasetColumns"
                  optionLabel="columnToView"
                  optionValue="columnToUse"
                  [placeholder]="'RLS.SELECT_COLUMN' | translate"
                  [filter]="true"
                  filterBy="columnToView"
                  [autoDisplayFirst]="false"
                  [required]="true"
                  [showError]="
                    !!(
                      conditions.at(i).get('columnName')?.invalid &&
                      conditions.at(i).get('columnName')?.touched
                    )
                  "
                  [errorMessage]="'RLS.COLUMN_REQUIRED' | translate"
                  (onChangeEvent)="onColumnChange(i, $event)"
                ></app-custom-dropdown>
                <app-custom-dropdown
                  formControlName="operator"
                  [options]="operatorOptions"
                  optionLabel="label"
                  optionValue="value"
                  [autoDisplayFirst]="false"
                  [required]="true"
                ></app-custom-dropdown>
                <button
                  type="button"
                  class="btn-remove-condition"
                  (click)="removeCondition(i)"
                  [disabled]="conditions.length === 1"
                  [pTooltip]="'RLS.REMOVE_CONDITION' | translate"
                  tooltipPosition="bottom"
                >
                  <i class="pi pi-trash"></i>
                </button>
              </div>
              <div class="condition-values-row">
                <app-custom-multiselect
                  formControlName="values"
                  [options]="getColumnValues(i)"
                  optionLabel="label"
                  optionValue="value"
                  [placeholder]="'RLS.SELECT_VALUES' | translate"
                  [filter]="true"
                  filterBy="label"
                  [showToggleAll]="true"
                  display="chip"
                  [maxSelectedLabels]="5"
                  [selectedItemsLabel]="'RLS.VALUES_SELECTED' | translate: { count: '{0}' }"
                  [required]="true"
                  [showError]="
                    !!(
                      conditions.at(i).get('values')?.invalid &&
                      conditions.at(i).get('values')?.touched
                    )
                  "
                  [errorMessage]="'RLS.VALUES_REQUIRED' | translate"
                ></app-custom-multiselect>
              </div>
            </div>
          </div>
        </div>

        <app-custom-toggle
          formControlName="isEnabled"
          [label]="'COMMON.ENABLED' | translate"
          [trueValue]="true"
          [falseValue]="false"
          [trueLabel]="'COMMON.ENABLED' | translate"
          [falseLabel]="'COMMON.DISABLED' | translate"
        >
        </app-custom-toggle>
      </div>
    </form>
  </div>
</div>

<!-- Save Confirmation -->
<div class="confirmation-popup" *ngIf="showSaveConfirm">
  <div class="popup-content">
    <div class="popup-header">
      <div class="popup-icon"><i class="pi pi-save"></i></div>
      <h3>{{ 'COMMON.CONFIRM_UPDATE' | translate }}</h3>
    </div>
    <div class="standard-delete-section">
      <p class="delete-intro">{{ 'RLS.UPDATE_CONFIRM' | translate }}</p>
      <div class="justification-section">
        <app-custom-input
          [(ngModel)]="saveJustification"
          [label]="'COMMON.JUSTIFICATION' | translate"
          [placeholder]="'COMMON.JUSTIFICATION_UPDATE_PLACEHOLDER' | translate"
          inputMode="textarea"
          [rows]="3"
          [maxLength]="500"
          [required]="true"
        ></app-custom-input>
        <small class="char-count">{{ saveJustification.length }}/500</small>
      </div>
    </div>
    <div class="popup-actions">
      <button class="btn-cancel" (click)="cancelSave()">
        <i class="pi pi-times"></i> {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button
        class="btn-confirm"
        (click)="proceedSave()"
        [disabled]="!saveJustification.trim()"
      >
        <i class="pi pi-check"></i> {{ 'COMMON.UPDATE' | translate }}
      </button>
    </div>
  </div>
</div>
