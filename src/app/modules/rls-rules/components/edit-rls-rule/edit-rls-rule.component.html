<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <div class="page-header">
      <div class="left-section">
        <button
          pButton
          class="p-button-text back-button"
          routerLink="/app/rls-rules"
        >
          <i class="pi pi-arrow-left"></i>
        </button>
        <h2>Edit RLS Rule</h2>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          label="Cancel"
          class="p-button-outlined btn-cancel"
          [disabled]="!isFormDirty"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          label="Save"
          (click)="onSubmit()"
          [disabled]="rlsForm.invalid || !isFormDirty"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>

    <form [formGroup]="rlsForm" class="admin-form" *ngIf="rlsForm">
      <div class="form-grid">
        <input type="hidden" formControlName="id" />

        <app-custom-input
          formControlName="name"
          label="Rule Name"
          placeholder="Enter rule name"
          [required]="true"
          [showError]="
            !!(rlsForm.get('name')?.invalid && rlsForm.get('name')?.touched)
          "
          [errorMessage]="getNameError()"
        >
        </app-custom-input>

        <app-custom-input
          formControlName="description"
          label="Description"
          placeholder="Enter description"
        >
        </app-custom-input>

        <!-- Organisation (read-only) -->
        <app-custom-input
          [ngModel]="orgId"
          [ngModelOptions]="{ standalone: true }"
          label="Organisation"
          [inputDisabled]="true"
        ></app-custom-input>
        <input type="hidden" formControlName="organisation" />

        <input type="hidden" formControlName="datasetId" />

        <!-- Filter Conditions -->
        <div class="conditions-section" formArrayName="conditions">
          <div class="conditions-header">
            <span class="conditions-label">
              Filter Conditions <span class="required">*</span>
            </span>
            <button
              type="button"
              class="btn-add-condition"
              (click)="addCondition()"
            >
              <i class="pi pi-plus"></i> Add Condition
            </button>
          </div>
          <div class="conditions-hint">
            <i class="pi pi-info-circle"></i>
            All conditions are AND-ed. Select values for each column condition.
          </div>
          <div
            class="condition-row"
            *ngFor="let cond of conditions.controls; let i = index"
            [formGroupName]="i"
          >
            <div class="condition-fields">
              <div class="condition-top-row">
                <app-custom-dropdown
                  formControlName="columnName"
                  [options]="datasetColumns"
                  optionLabel="columnToView"
                  optionValue="columnToUse"
                  placeholder="Select column"
                  [filter]="true"
                  filterBy="columnToView"
                  [autoDisplayFirst]="false"
                  [required]="true"
                  [showError]="!!(conditions.at(i).get('columnName')?.invalid && conditions.at(i).get('columnName')?.touched)"
                  errorMessage="Column is required"
                  (onChangeEvent)="onColumnChange(i, $event)"
                ></app-custom-dropdown>
                <app-custom-dropdown
                  formControlName="operator"
                  [options]="operatorOptions"
                  optionLabel="label"
                  optionValue="value"
                  [autoDisplayFirst]="false"
                  [required]="true"
                ></app-custom-dropdown>
                <button
                  type="button"
                  class="btn-remove-condition"
                  (click)="removeCondition(i)"
                  [disabled]="conditions.length === 1"
                  pTooltip="Remove condition"
                  tooltipPosition="bottom"
                >
                  <i class="pi pi-trash"></i>
                </button>
              </div>
              <div class="condition-values-row">
                <app-custom-multiselect
                  formControlName="values"
                  [options]="getColumnValues(i)"
                  optionLabel="label"
                  optionValue="value"
                  placeholder="Select values"
                  [filter]="true"
                  filterBy="label"
                  [showToggleAll]="true"
                  display="chip"
                  [maxSelectedLabels]="5"
                  selectedItemsLabel="{0} values selected"
                  [required]="true"
                  [showError]="!!(conditions.at(i).get('values')?.invalid && conditions.at(i).get('values')?.touched)"
                  errorMessage="At least one value is required"
                ></app-custom-multiselect>
              </div>
            </div>
          </div>
        </div>

        <app-custom-toggle
          formControlName="isEnabled"
          label="Enabled"
          [trueValue]="true"
          [falseValue]="false"
          trueLabel="Enabled"
          falseLabel="Disabled"
        >
        </app-custom-toggle>
      </div>
    </form>
  </div>
</div>

<!-- Save Confirmation -->
<div class="confirmation-popup" *ngIf="showSaveConfirm">
  <div class="popup-content">
    <div class="popup-header">
      <div class="popup-icon"><i class="pi pi-save"></i></div>
      <h3>Confirm Update</h3>
    </div>
    <div class="standard-delete-section">
      <p class="delete-intro">Are you sure you want to update this RLS rule?</p>
      <div class="justification-section">
        <app-custom-input
          [(ngModel)]="saveJustification"
          label="Justification"
          placeholder="Provide a reason for this update"
          inputMode="textarea"
          [rows]="3"
          [maxLength]="500"
          [required]="true"
        ></app-custom-input>
        <small class="char-count">{{ saveJustification.length }}/500</small>
      </div>
    </div>
    <div class="popup-actions">
      <button class="btn-cancel" (click)="cancelSave()">
        <i class="pi pi-times"></i> Cancel
      </button>
      <button
        class="btn-confirm"
        (click)="proceedSave()"
        [disabled]="!saveJustification.trim()"
      >
        <i class="pi pi-check"></i> Update
      </button>
    </div>
  </div>
</div>
