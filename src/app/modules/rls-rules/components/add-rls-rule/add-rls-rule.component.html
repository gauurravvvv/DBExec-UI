<div class="add-admin-wrapper">
  <div class="add-admin-container">
    <div class="page-header">
      <div class="left-section">
        <button
          pButton
          class="p-button-text back-button"
          routerLink="/app/rls-rules"
        >
          <i class="pi pi-arrow-left"></i>
        </button>
        <h2>Add RLS Rule</h2>
      </div>
      <div class="action-buttons">
        <button
          pButton
          type="button"
          label="Cancel"
          class="p-button-outlined btn-cancel"
          (click)="onCancel()"
        ></button>
        <button
          pButton
          class="p-button-primary btn-save"
          type="submit"
          label="Save"
          (click)="onSubmit()"
        >
          <i class="pi pi-save mr-2"></i>
        </button>
      </div>
    </div>

    <form [formGroup]="rlsForm" class="admin-form">
      <div class="form-grid">
        <app-custom-input
          formControlName="name"
          label="Rule Name"
          placeholder="Enter rule name"
          [required]="true"
          [showError]="
            !!(rlsForm.get('name')?.invalid && rlsForm.get('name')?.touched)
          "
          [errorMessage]="getNameError()"
        >
        </app-custom-input>

        <app-custom-input
          formControlName="description"
          label="Description"
          placeholder="Enter description"
        >
        </app-custom-input>

        <app-custom-dropdown
          *ngIf="showOrganisationDropdown"
          formControlName="organisation"
          label="Organisation"
          placeholder="Select Organisation"
          [options]="organisations"
          optionLabel="name"
          optionValue="id"
          [filter]="true"
          filterBy="name"
          [autoDisplayFirst]="false"
          [required]="true"
          [showError]="
            !!(
              rlsForm.get('organisation')?.invalid &&
              rlsForm.get('organisation')?.touched
            )
          "
          errorMessage="Organisation is required"
        >
        </app-custom-dropdown>

        <app-custom-dropdown
          [ngModel]="selectedDatasource"
          [ngModelOptions]="{ standalone: true }"
          label="Datasource"
          placeholder="Select Datasource"
          [options]="datasources"
          optionLabel="name"
          optionValue="id"
          [filter]="true"
          filterBy="name"
          [autoDisplayFirst]="false"
          [required]="true"
          (onChangeEvent)="onDatasourceChange($event)"
        >
        </app-custom-dropdown>

        <app-custom-dropdown
          formControlName="datasetId"
          label="Dataset"
          placeholder="Select Dataset"
          [options]="datasets"
          optionLabel="name"
          optionValue="id"
          [filter]="true"
          filterBy="name"
          [autoDisplayFirst]="false"
          [required]="true"
          [showError]="
            !!(
              rlsForm.get('datasetId')?.invalid &&
              rlsForm.get('datasetId')?.touched
            )
          "
          errorMessage="Dataset is required"
        >
        </app-custom-dropdown>

        <!-- Filter Conditions -->
        <div class="conditions-section" formArrayName="conditions">
          <div class="conditions-header">
            <span class="conditions-label">
              Filter Conditions <span class="required">*</span>
            </span>
            <button
              type="button"
              class="btn-add-condition"
              (click)="addCondition()"
            >
              <i class="pi pi-plus"></i> Add Condition
            </button>
          </div>
          <div class="conditions-hint">
            <i class="pi pi-info-circle"></i>
            All conditions are AND-ed. Select values for each column condition.
          </div>
          <div
            class="condition-row"
            *ngFor="let cond of conditions.controls; let i = index"
            [formGroupName]="i"
          >
            <div class="condition-fields">
              <div class="condition-top-row">
                <app-custom-dropdown
                  formControlName="columnName"
                  [options]="datasetColumns"
                  optionLabel="columnToView"
                  optionValue="columnToUse"
                  placeholder="Select column"
                  [filter]="true"
                  filterBy="columnToView"
                  [autoDisplayFirst]="false"
                  [required]="true"
                  [showError]="!!(conditions.at(i).get('columnName')?.invalid && conditions.at(i).get('columnName')?.touched)"
                  errorMessage="Column is required"
                  (onChangeEvent)="onColumnChange(i, $event)"
                ></app-custom-dropdown>
                <app-custom-dropdown
                  formControlName="operator"
                  [options]="operatorOptions"
                  optionLabel="label"
                  optionValue="value"
                  [autoDisplayFirst]="false"
                  [required]="true"
                ></app-custom-dropdown>
                <button
                  type="button"
                  class="btn-remove-condition"
                  (click)="removeCondition(i)"
                  [disabled]="conditions.length === 1"
                  pTooltip="Remove condition"
                  tooltipPosition="bottom"
                >
                  <i class="pi pi-trash"></i>
                </button>
              </div>
              <div class="condition-values-row">
                <app-custom-multiselect
                  formControlName="values"
                  [options]="getColumnValues(i)"
                  optionLabel="label"
                  optionValue="value"
                  placeholder="Select values"
                  [filter]="true"
                  filterBy="label"
                  [showToggleAll]="true"
                  display="chip"
                  [maxSelectedLabels]="5"
                  selectedItemsLabel="{0} values selected"
                  [required]="true"
                  [showError]="!!(conditions.at(i).get('values')?.invalid && conditions.at(i).get('values')?.touched)"
                  errorMessage="At least one value is required"
                ></app-custom-multiselect>
              </div>
            </div>
          </div>
        </div>

        <app-custom-toggle
          formControlName="isEnabled"
          label="Enabled"
          [trueValue]="true"
          [falseValue]="false"
          trueLabel="Enabled"
          falseLabel="Disabled"
        >
        </app-custom-toggle>
      </div>
    </form>
  </div>
</div>
