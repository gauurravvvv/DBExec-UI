<div class="confirmation-popup">
  <div class="popup-content assignments-popup">
    <!-- Header -->
    <div class="popup-header">
      <div class="popup-icon">
        <i class="pi pi-users"></i>
      </div>
      <h3>{{ 'RLS.MANAGE_ASSIGNMENTS' | translate }}</h3>
      <p class="popup-subtitle">{{ rule?.name }}</p>
    </div>

    <!-- Add Assignment Form -->
    <div class="add-assignment-section">
      <div class="add-assignment-form">
        <app-custom-dropdown
          [(ngModel)]="newScope"
          [options]="scopeOptions"
          optionLabel="label"
          optionValue="value"
          [label]="'RLS.SCOPE' | translate"
          [placeholder]="'RLS.SELECT_SCOPE' | translate"
          [autoDisplayFirst]="false"
          (onChangeEvent)="onScopeChange($event)"
        ></app-custom-dropdown>

        <app-custom-dropdown
          [(ngModel)]="newScopeId"
          [options]="scopeTargets"
          optionLabel="label"
          optionValue="value"
          [label]="newScope === 'user' ? ('RLS.USER' | translate) : ('RLS.GROUP' | translate)"
          [placeholder]="newScope === 'user' ? ('RLS.SELECT_USER' | translate) : ('RLS.SELECT_GROUP' | translate)"
          [filter]="true"
          [autoDisplayFirst]="false"
          [disabled]="!newScope || scopeTargetsLoading"
        ></app-custom-dropdown>

        <button
          class="btn-add-assignment"
          (click)="addAssignment()"
          [disabled]="!newScope || !newScopeId || saving()"
        >
          <i class="pi pi-plus"></i>
          {{ saving() ? ('RLS.ADDING' | translate) : ('RLS.ADD_ASSIGNMENT' | translate) }}
        </button>
      </div>
    </div>

    <!-- Assignments List -->
    <div class="assignments-list-section">
      <div class="section-label">
        {{ 'RLS.CURRENT_ASSIGNMENTS' | translate }}
        <span class="count-badge">{{ assignments().length }}</span>
      </div>

      <div class="loading-state" *ngIf="isLoadingAssignments">
        <i class="pi pi-spin pi-spinner"></i>
        <span>{{ 'RLS.LOADING_ASSIGNMENTS' | translate }}</span>
      </div>

      <div
        class="empty-state"
        *ngIf="!isLoadingAssignments && assignments().length === 0"
      >
        <i class="pi pi-users"></i>
        <p>{{ 'RLS.NO_ASSIGNMENTS_ADD_MSG' | translate }}</p>
      </div>

      <div
        class="assignment-list"
        *ngIf="!isLoadingAssignments && assignments().length > 0"
      >
        <div
          class="assignment-row"
          *ngFor="let a of assignments(); trackBy: trackById"
        >
          <i
            class="pi"
            [ngClass]="a.scope === 'user' ? 'pi-user' : 'pi-users'"
          ></i>
          <div class="assignment-info">
            <span class="assignment-name">{{ a.scopeName || a.scopeId }}</span>
            <span class="assignment-type">{{ a.scope }}</span>
          </div>
          <button
            class="btn-remove"
            (click)="removeAssignment(a)"
            [pTooltip]="'RLS.REMOVE_ASSIGNMENT' | translate"
            tooltipPosition="left"
            [disabled]="saving()"
          >
            <i class="pi pi-trash"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Actions -->
    <div class="popup-actions">
      <button class="btn-cancel" (click)="close()">
        <i class="pi pi-times"></i> {{ 'COMMON.CLOSE' | translate }}
      </button>
    </div>
  </div>
</div>
