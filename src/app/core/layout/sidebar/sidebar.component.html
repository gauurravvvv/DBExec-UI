<aside
  class="sidebar"
  [class.collapsed]="!isExpanded"
  [class.mobile]="isMobile"
  [class.peek-overlay]="isPeekOverlay"
  role="navigation"
  aria-label="Main Navigation"
>
  <!-- Header slot: just the collapse toggle. The slot is rendered in both
       modes so the first nav item never tucks under the toggle. -->
  <div class="sidebar-header">
    <button
      class="toggle-btn"
      [class.outside]="isExpanded"
      (click)="toggleSidebar()"
      [pTooltip]="isExpanded ? 'Collapse' : 'Expand'"
      tooltipPosition="right"
    >
      <i
        class="pi"
        [ngClass]="{
          'pi-chevron-right': !isExpanded,
          'pi-chevron-left': isExpanded,
        }"
      ></i>
    </button>
  </div>

  <div
    class="sidebar-content"
    (mouseenter)="onSidebarMouseEnter()"
    (mouseleave)="onSidebarMouseLeave()"
  >
    <nav class="sidebar-nav">
      <ul class="nav-list">
        <li
          *ngFor="let item of menuItems; trackBy: trackByIndex"
          class="nav-item"
        >
          <!-- Menu item with subPermissions -->
          <div
            *ngIf="item.subPermissions?.length"
            class="nav-link expandable"
            (click)="toggleSubmenuAndExpand(item)"
            (mouseenter)="onParentMouseEnter(item)"
            (mouseleave)="onParentMouseLeave(item)"
            [class.expanded]="item.isExpanded"
            [class.has-active-child]="hasActiveDescendant(item)"
          >
            <div class="link-content">
              <i [class]="item.icon"></i>
              <span class="nav-text">{{
                'SIDEBAR.' + item.value | translate
              }}</span>
            </div>
            <i
              class="pi pi-chevron-down submenu-arrow"
              [class.expanded]="item.isExpanded"
            ></i>
          </div>

          <!-- Menu item without subPermissions -->
          <a
            *ngIf="!item.subPermissions?.length"
            [routerLink]="item.route"
            routerLinkActive="active"
            #rla="routerLinkActive"
            [attr.aria-current]="rla.isActive ? 'page' : null"
            class="nav-link"
          >
            <div class="link-content">
              <i [class]="item.icon"></i>
              <span class="nav-text">{{
                'SIDEBAR.' + item.value | translate
              }}</span>
            </div>
          </a>

          <!-- Submenu -->
          <ul
            class="submenu"
            [class.expanded]="item.isExpanded"
            *ngIf="item.subPermissions"
          >
            <li
              *ngFor="let subItem of item.subPermissions; trackBy: trackByIndex"
              class="submenu-item"
            >
              <!-- Submenu item with children -->
              <div
                *ngIf="subItem.subPermissions?.length"
                class="submenu-link"
                (click)="toggleSubmenuAndExpand(subItem)"
                (mouseenter)="onParentMouseEnter(subItem)"
                (mouseleave)="onParentMouseLeave(subItem)"
                [class.expanded]="subItem.isExpanded"
                [class.has-active-child]="hasActiveDescendant(subItem)"
              >
                <div class="link-content">
                  <i [class]="subItem.icon"></i>
                  <span class="nav-text">{{
                    'SIDEBAR.' + subItem.value | translate
                  }}</span>
                </div>
                <i
                  class="pi pi-chevron-down submenu-arrow"
                  [class.expanded]="subItem.isExpanded"
                ></i>
              </div>

              <!-- Submenu item without children -->
              <a
                *ngIf="!subItem.subPermissions?.length"
                [routerLink]="subItem.route"
                routerLinkActive="active"
                #rlaSub="routerLinkActive"
                [attr.aria-current]="rlaSub.isActive ? 'page' : null"
              >
                <div class="link-content">
                  <i [class]="subItem.icon"></i>
                  <span class="nav-text">{{
                    'SIDEBAR.' + subItem.value | translate
                  }}</span>
                </div>
              </a>

              <!-- Nested submenu -->
              <ng-container
                *ngTemplateOutlet="
                  nestedSubmenu;
                  context: { $implicit: subItem }
                "
              ></ng-container>
            </li>
          </ul>
        </li>
      </ul>
    </nav>
  </div>
</aside>

<!-- Template for nested submenus -->
<ng-template #nestedSubmenu let-item>
  <ul
    class="nested-submenu"
    [class.expanded]="item.isExpanded"
    *ngIf="item.subPermissions"
  >
    <li
      *ngFor="let nestedItem of item.subPermissions; trackBy: trackByIndex"
      class="nested-submenu-item"
    >
      <!-- Nested item with children -->
      <div
        *ngIf="nestedItem.subPermissions?.length"
        class="submenu-link"
        (click)="toggleSubmenuAndExpand(nestedItem)"
        (mouseenter)="onParentMouseEnter(nestedItem)"
        (mouseleave)="onParentMouseLeave(nestedItem)"
        [class.expanded]="nestedItem.isExpanded"
        [class.has-active-child]="hasActiveDescendant(nestedItem)"
      >
        <div class="link-content">
          <i [class]="nestedItem.icon"></i>
          <span class="nav-text">{{
            'SIDEBAR.' + nestedItem.value | translate
          }}</span>
        </div>
        <i
          class="pi pi-chevron-down submenu-arrow"
          [class.expanded]="nestedItem.isExpanded"
        ></i>
      </div>

      <!-- Nested item without children -->
      <a
        *ngIf="!nestedItem.subPermissions?.length"
        [routerLink]="nestedItem.route"
        routerLinkActive="active"
        #rlaNested="routerLinkActive"
        [attr.aria-current]="rlaNested.isActive ? 'page' : null"
      >
        <div class="link-content">
          <i [class]="nestedItem.icon"></i>
          <span class="nav-text">{{
            'SIDEBAR.' + nestedItem.value | translate
          }}</span>
        </div>
      </a>

      <!-- Recursively handle deeper levels -->
      <ng-container
        *ngTemplateOutlet="nestedSubmenu; context: { $implicit: nestedItem }"
      ></ng-container>
    </li>
  </ul>
</ng-template>
